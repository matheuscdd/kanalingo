<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Video → Frames ULTRA</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
body { font-family: Arial; max-width: 900px; margin:auto }
canvas { max-width: 100% }
progress { width:100%; height:20px }
</style>
</head>
<body>

<h2>Extrator ULTRA (WebCodecs)</h2>

<input type="file" id="fileInput" accept="video/*"><br><br>

FPS <input type="number" id="fps" value="24">
Escala <input type="number" id="scale" value="1" step="0.1">

<button id="start">START</button>
<button id="cancel">CANCEL</button>

<progress id="bar" value="0" max="100"></progress>
<p id="status"></p>

<canvas id="preview"></canvas>

<script type="module">

const fpsInput = document.getElementById("fps");
const scaleInput = document.getElementById("scale");
const bar = document.getElementById("bar");
const status = document.getElementById("status");

let cancel = false;
document.getElementById("cancel").onclick = () => cancel = true;

async function hash(buffer){
  const h = await crypto.subtle.digest("SHA-256", buffer);
  return [...new Uint8Array(h)]
    .map(x=>x.toString(16).padStart(2,"0"))
    .join("");
}

document.getElementById("start").onclick = async () => {

  cancel = false;

  const file = fileInput.files[0];
  if(!file) return alert("Selecione um vídeo");

  const fps = Number(fpsInput.value);
  const scale = Number(scaleInput.value);

  const zip = new JSZip();
  const hashes = new Set();

  const preview = document.getElementById("preview");
  const ctx = preview.getContext("2d");

  const video = document.createElement("video");
  video.src = URL.createObjectURL(file);

  await video.play().catch(()=>{});
  video.pause();

  const duration = video.duration;

  preview.width = video.videoWidth * scale;
  preview.height = video.videoHeight * scale;

  const totalFrames = duration * fps;
  let frameIndex = 0;

  for (let t = 0; t < duration; t += 1/fps) {

    if(cancel){
      status.innerText = "Cancelado ❌";
      return;
    }

    video.currentTime = t;

    await new Promise(r => video.onseeked = r);

    ctx.drawImage(video, 0, 0, preview.width, preview.height);

    const blob = await new Promise(r => preview.toBlob(r,"image/png"));
    const buffer = await blob.arrayBuffer();

    const h = await hash(buffer);

    if(!hashes.has(h)){
      hashes.add(h);
      zip.file(`frame-${String(frameIndex).padStart(5,"0")}.png`, blob);
      frameIndex++;
    }

    bar.value = (t / duration) * 100;

    status.innerText =
      `Frames: ${frameIndex}
${bar.value.toFixed(1)}%`;
  }

  status.innerText = "Compactando ZIP...";

  const content = await zip.generateAsync({type:"blob"});

  const a = document.createElement("a");
  a.href = URL.createObjectURL(content);
  a.download = "frames.zip";
  a.click();

  status.innerText = "Finalizado ✅";
};

</script>
</body>
</html>
