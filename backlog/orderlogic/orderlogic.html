<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Number Quest - Minecraft Style</title>
    
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; outline: none; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; z-index: 10; }
        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .hud-panel { background: rgba(20, 20, 40, 0.8); color: white; padding: 15px 25px; border-radius: 12px; border: 2px solid rgba(255, 255, 255, 0.15); box-shadow: 0 8px 16px rgba(0,0,0,0.4); backdrop-filter: blur(8px); }
        .lives { font-size: 24px; color: #ff4757; margin-bottom: 8px; display: flex; gap: 6px; }
        .info-text { font-size: 14px; font-weight: 600; color: #a4b0be; text-transform: uppercase; letter-spacing: 1px; }
        #message-container { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
        .message-text { font-size: 56px; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; text-shadow: 4px 4px 0 #000; }
        .success { color: #2ed573; }
        .error { color: #ff4757; }
        .level-up { color: #feca57; }
        .controls-info { align-self: center; background: rgba(0,0,0,0.6); color: #dfe4ea; padding: 12px 24px; border-radius: 30px; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }

        /* Estilos do Botão de Debug */
        .debug-btn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(46, 204, 113, 0.8);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            pointer-events: auto;
            z-index: 20;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .debug-btn:hover { background: rgba(39, 174, 96, 1); }
        .debug-btn.active { background: #e74c3c; border-color: #c0392b; }
    </style>
</head>
<body>

    <div id="hud">
        <button id="btn-freecam" class="debug-btn"><i class="fa-solid fa-video"></i> Câmera Livre (Debug)</button>
        <div class="hud-top">
            <div class="hud-panel">
                <div class="lives" id="lives-container"></div>
                <div class="info-text" id="round-display">Rodada: 1</div>
            </div>
        </div>
        <div id="message-container"><div id="message-text" class="message-text"></div></div>
        <div class="controls-info"><i class="fa-solid fa-person-walking"></i> Use <b>WASD</b> para mover. Ordene as Frases e evite os golpes!</div>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById("renderCanvas");
            const engine = new BABYLON.Engine(canvas, true);
            
            let scene, camera, player, advancedTexture, shadowGenerator;
            let enemies = []; 
            let sceneryItems = []; 
            let inputMap = {};
            let cameraShake = BABYLON.Vector3.Zero();
            let isFreeCam = false; // Estado da câmera de debug
            
            // Banco de frases (podem ter até 60 caracteres)
            const phraseBank = [
                "A raposa marrom salta rápido", "Bolo de cenoura com chocolate", "Cachorro correndo no parque",
                "Dia de sol na praia", "Elefante gigante na savana", "Fada dos dentes voando",
                "Gato dormindo no sofá", "Hipopótamo nadando feliz", "Igreja antiga da cidade",
                "Jacaré tomando sol na lagoa", "Kiwis são azedos mas doces", "Limão com mel é bom",
                "Macaco pulando de galho em galho", "Navio pirata em busca do tesouro",
                "Ovo frito no café da manhã", "Pato nadando tranquilamente",
                "Queijo suíço cheio de furos", "Rato roeu a roupa do rei",
                "Sapo cururu na beira do rio", "Tatu bola cavando buraco",
                "Uva passa na comida do natal", "Vaca malhada comendo pasto",
                "Zebra listrada correndo rápido", "Avião de papel voando alto",
                "Bola de futebol rolando", "Carro vermelho muito veloz",
                "Dinossauro rex assustador", "Estrela cadente no céu noturno"
            ];

            let gameState = {
                lives: 3, maxLives: 3, round: 1, enemiesPerRound: 8,
                targets: [], sortedTargets: [], currentIndex: 0, isPlaying: true
            };

            let materials = {};
            let playerParts = {};
            let baseTrollParts = {}; 
            let baseGoblinParts = {}; 

            // --- HUD ---
            function updateHUD() {
                const livesContainer = document.getElementById("lives-container");
                livesContainer.innerHTML = "";
                for (let i = 0; i < gameState.maxLives; i++) {
                    livesContainer.innerHTML += (i < gameState.lives) ? '<i class="fa-solid fa-heart"></i>' : '<i class="fa-regular fa-heart" style="color: #333;"></i>';
                }
                document.getElementById("round-display").innerText = `Rodada: ${gameState.round}`;
                
                // Atualiza a placa acima da cabeça do Jogador
                if (playerParts && playerParts.guiLabel) {
                    if (gameState.currentIndex > 0 && gameState.isPlaying) {
                        playerParts.guiLabel.text = gameState.sortedTargets[gameState.currentIndex - 1];
                    } else {
                        playerParts.guiLabel.text = "Início da Rodada";
                    }
                }
            }

            function showMessage(text, type) {
                const container = document.getElementById("message-container");
                const msgEl = document.getElementById("message-text");
                msgEl.innerText = text;
                msgEl.className = `message-text ${type}`;
                container.style.opacity = 1;
                setTimeout(() => { container.style.opacity = 0; }, 1500);
            }

            // --- MATERIAIS COM TEXTURA VOXEL (Estilo Minecraft Seguro para todos os navegadores) ---
            function setupMaterials() {
                
                function createPixelTexture(baseHex, variance, pattern) {
                    const canvasTemp = document.createElement("canvas");
                    const texSize = 64;  
                    const pSize = 4;     
                    canvasTemp.width = texSize;
                    canvasTemp.height = texSize;
                    const ctx = canvasTemp.getContext("2d");
                    
                    let r = parseInt(baseHex.slice(1,3), 16);
                    let g = parseInt(baseHex.slice(3,5), 16);
                    let b = parseInt(baseHex.slice(5,7), 16);
                    
                    for (let x = 0; x < texSize; x += pSize) {
                        for (let y = 0; y < texSize; y += pSize) {
                            let px = x / pSize; 
                            let py = y / pSize; 
                            
                            let noise = (Math.random() - 0.5) * variance;
                            let cR = r + noise, cG = g + noise, cB = b + noise;

                            if (pattern === "grass") {
                                if (Math.random() < 0.2) { cR -= 40; cG += 30; cB -= 40; } 
                                if (px === 0 || py === 0 || px === 15 || py === 15) { cR -= 25; cG -= 25; cB -= 25; } 
                            } 
                            else if (pattern === "stone") {
                                if (Math.random() < 0.1 || (px+py)%6 === 0) { cR -= 40; cG -= 40; cB -= 40; } 
                                if (px === 0 || py === 0) { cR += 20; cG += 20; cB += 20; } 
                            }
                            else if (pattern === "wood") {
                                if (px % 4 === 0 || Math.random() < 0.1) { cR -= 50; cG -= 50; cB -= 50; } 
                            }
                            else if (pattern === "leaves") {
                                if ((px+py) % 2 === 0) { cR -= 40; cG -= 40; cB -= 40; } 
                                if (Math.random() < 0.2) { cR += 30; cG += 30; cB += 30; } 
                            }
                            else if (pattern === "cloth") {
                                if (py === 14 || py === 15) { cR -= 40; cG -= 40; cB -= 40; } 
                                if (px % 2 === 0 && py % 2 === 0) { cR += 15; cG += 15; cB += 15; } 
                            }
                            else if (pattern === "metal") {
                                if (px + py === 15 || px + py === 16) { cR += 70; cG += 70; cB += 70; } 
                                if (px === 0 || py === 0 || px === 15 || py === 15) { cR -= 40; cG -= 40; cB -= 40; } 
                            }

                            cR = Math.floor(Math.min(255, Math.max(0, cR)));
                            cG = Math.floor(Math.min(255, Math.max(0, cG)));
                            cB = Math.floor(Math.min(255, Math.max(0, cB)));
                            
                            ctx.fillStyle = `rgb(${cR},${cG},${cB})`;
                            ctx.fillRect(x, y, pSize, pSize);
                        }
                    }
                    
                    const tex = new BABYLON.Texture(canvasTemp.toDataURL("image/png"), scene, true, false, BABYLON.Texture.NEAREST_SAMPLINGMODE);
                    tex.wrapU = BABYLON.Texture.WRAP_ADDRESSMODE;
                    tex.wrapV = BABYLON.Texture.WRAP_ADDRESSMODE;
                    return tex;
                }

                const setMaterial = (name, hex, variance, pattern) => {
                    const mat = new BABYLON.StandardMaterial(name, scene);
                    mat.diffuseTexture = createPixelTexture(hex, variance, pattern);
                    mat.diffuseColor = new BABYLON.Color3(1, 1, 1); 
                    mat.specularColor = new BABYLON.Color3(0, 0, 0); 
                    return mat;
                };

                materials.eye = new BABYLON.StandardMaterial("mEye", scene);
                materials.eye.diffuseColor = new BABYLON.Color3(0.05, 0.05, 0.05);
                materials.eye.specularColor = new BABYLON.Color3(0, 0, 0);

                materials.skin = setMaterial("mSkin", "#f1c27d", 25, "noise");
                materials.shirt = setMaterial("mShirt", "#2980b9", 30, "cloth");
                materials.pants = setMaterial("mPants", "#2c3e50", 30, "cloth");
                
                materials.grass = setMaterial("mGrass", "#4caf50", 40, "grass");
                materials.grass.diffuseTexture.uScale = 40; 
                materials.grass.diffuseTexture.vScale = 40;
                
                materials.stone = setMaterial("mStone", "#7f8c8d", 40, "stone");
                materials.trunk = setMaterial("mTrunk", "#5d4037", 30, "wood");
                materials.leaves = setMaterial("mLeaves", "#2e7d32", 30, "leaves");
                materials.rock = setMaterial("mRock", "#95a5a6", 40, "stone");
                materials.bush = setMaterial("mBush", "#388e3c", 30, "leaves");

                materials.hitEffect = new BABYLON.StandardMaterial("mHit", scene);
                materials.hitEffect.diffuseColor = new BABYLON.Color3(1, 0, 0);

                materials.trollBase = setMaterial("mTrollBase", "#ffffff", 50, "cloth"); 

                materials.swordBlade = setMaterial("mSwordBlade", "#74b9ff", 25, "metal"); 
                materials.swordHandle = setMaterial("mSwordHandle", "#6d4c41", 30, "wood"); 
                materials.armor = setMaterial("mArmor", "#bdc3c7", 30, "metal"); 
                materials.gold = setMaterial("mGold", "#f1c40f", 20, "metal"); 
                materials.crest = setMaterial("mCrest", "#e74c3c", 30, "cloth"); 
            }

            // --- PERSONAGEM VOXEL ---
            function createPlayer() {
                const playerRoot = new BABYLON.TransformNode("playerRoot", scene);
                const body = BABYLON.MeshBuilder.CreateBox("body", {width: 0.8, height: 1.2, depth: 0.4}, scene);
                body.parent = playerRoot; body.position.y = 1.2; body.material = materials.shirt;

                const head = BABYLON.MeshBuilder.CreateBox("head", {size: 0.8}, scene);
                head.parent = body; head.position.y = 1.0; head.material = materials.skin;

                const eyeL = BABYLON.MeshBuilder.CreateBox("eyeL", {width: 0.1, height: 0.1, depth: 0.05}, scene);
                eyeL.parent = head; eyeL.position.set(-0.15, 0.1, 0.41); eyeL.material = materials.eye;
                
                const eyeR = BABYLON.MeshBuilder.CreateBox("eyeR", {width: 0.1, height: 0.1, depth: 0.05}, scene);
                eyeR.parent = head; eyeR.position.set(0.15, 0.1, 0.41); eyeR.material = materials.eye;

                const leftArm = BABYLON.MeshBuilder.CreateBox("leftArm", {width: 0.35, height: 1.1, depth: 0.35}, scene);
                leftArm.parent = body; leftArm.position.set(-0.6, 0, 0); leftArm.setPivotPoint(new BABYLON.Vector3(0, 0.5, 0)); leftArm.material = materials.shirt;

                const rightArm = BABYLON.MeshBuilder.CreateBox("rightArm", {width: 0.35, height: 1.1, depth: 0.35}, scene);
                rightArm.parent = body; rightArm.position.set(0.6, 0, 0); rightArm.setPivotPoint(new BABYLON.Vector3(0, 0.5, 0)); rightArm.material = materials.shirt;

                const leftLeg = BABYLON.MeshBuilder.CreateBox("leftLeg", {width: 0.38, height: 1.2, depth: 0.38}, scene);
                leftLeg.parent = playerRoot; leftLeg.position.set(-0.2, 0.6, 0); leftLeg.setPivotPoint(new BABYLON.Vector3(0, 0.6, 0)); leftLeg.material = materials.pants;

                const rightLeg = BABYLON.MeshBuilder.CreateBox("rightLeg", {width: 0.38, height: 1.2, depth: 0.38}, scene);
                rightLeg.parent = playerRoot; rightLeg.position.set(0.2, 0.6, 0); rightLeg.setPivotPoint(new BABYLON.Vector3(0, 0.6, 0)); rightLeg.material = materials.pants;

                // --- CAPACETE DE CENTURIÃO ROMANO ---
                const helmetRoot = new BABYLON.TransformNode("helmetRoot", scene);
                helmetRoot.parent = head;

                const helmetBase = BABYLON.MeshBuilder.CreateBox("hBase", {width: 0.84, height: 0.45, depth: 0.84}, scene);
                helmetBase.parent = helmetRoot; helmetBase.position.y = 0.2; helmetBase.material = materials.armor;

                const helmetTop = BABYLON.MeshBuilder.CreateBox("hTop", {width: 0.6, height: 0.15, depth: 0.6}, scene);
                helmetTop.parent = helmetRoot; helmetTop.position.y = 0.5; helmetTop.material = materials.armor;

                const helmetRim = BABYLON.MeshBuilder.CreateBox("hRim", {width: 0.88, height: 0.1, depth: 0.88}, scene);
                helmetRim.parent = helmetRoot; helmetRim.position.y = 0.0; helmetRim.material = materials.gold;

                const neckGuard = BABYLON.MeshBuilder.CreateBox("nGuard", {width: 0.86, height: 0.1, depth: 0.4}, scene);
                neckGuard.parent = helmetRoot; neckGuard.position.set(0, -0.15, -0.4); neckGuard.rotation.x = -Math.PI / 6; neckGuard.material = materials.armor;

                const cheekL = BABYLON.MeshBuilder.CreateBox("cheekL", {width: 0.1, height: 0.4, depth: 0.3}, scene);
                cheekL.parent = helmetRoot; cheekL.position.set(-0.4, -0.2, 0.15); cheekL.material = materials.armor;

                const cheekR = BABYLON.MeshBuilder.CreateBox("cheekR", {width: 0.1, height: 0.4, depth: 0.3}, scene);
                cheekR.parent = helmetRoot; cheekR.position.set(0.4, -0.2, 0.15); cheekR.material = materials.armor;

                const crestBase = BABYLON.MeshBuilder.CreateBox("crestBase", {width: 0.8, height: 0.15, depth: 0.15}, scene);
                crestBase.parent = helmetRoot; crestBase.position.set(0, 0.62, 0); crestBase.material = materials.gold;

                const plumeTier1 = BABYLON.MeshBuilder.CreateBox("plume1", {width: 1.4, height: 0.2, depth: 0.12}, scene);
                plumeTier1.parent = helmetRoot; plumeTier1.position.set(0, 0.78, 0); plumeTier1.material = materials.crest;

                const plumeTier2 = BABYLON.MeshBuilder.CreateBox("plume2", {width: 1.2, height: 0.2, depth: 0.12}, scene);
                plumeTier2.parent = helmetRoot; plumeTier2.position.set(0, 0.95, 0); plumeTier2.material = materials.crest;

                const plumeTier3 = BABYLON.MeshBuilder.CreateBox("plume3", {width: 0.9, height: 0.2, depth: 0.12}, scene);
                plumeTier3.parent = helmetRoot; plumeTier3.position.set(0, 1.12, 0); plumeTier3.material = materials.crest;

                const chestplate = BABYLON.MeshBuilder.CreateBox("chestplate", {width: 0.85, height: 1.1, depth: 0.45}, scene);
                chestplate.parent = body; chestplate.position.y = 0.05; chestplate.material = materials.armor;

                const leftPauldron = BABYLON.MeshBuilder.CreateBox("leftPauldron", {width: 0.42, height: 0.35, depth: 0.42}, scene);
                leftPauldron.parent = leftArm; leftPauldron.position.y = 0.4; leftPauldron.material = materials.armor;

                const rightPauldron = BABYLON.MeshBuilder.CreateBox("rightPauldron", {width: 0.42, height: 0.35, depth: 0.42}, scene);
                rightPauldron.parent = rightArm; rightPauldron.position.y = 0.4; rightPauldron.material = materials.armor;

                const leftBoot = BABYLON.MeshBuilder.CreateBox("leftBoot", {width: 0.42, height: 0.35, depth: 0.42}, scene);
                leftBoot.parent = leftLeg; leftBoot.position.y = -0.45; leftBoot.material = materials.armor;

                const rightBoot = BABYLON.MeshBuilder.CreateBox("rightBoot", {width: 0.42, height: 0.35, depth: 0.42}, scene);
                rightBoot.parent = rightLeg; rightBoot.position.y = -0.45; rightBoot.material = materials.armor;

                const armorParts = [
                    helmetBase, helmetTop, helmetRim, neckGuard, cheekL, cheekR, crestBase, 
                    plumeTier1, plumeTier2, plumeTier3, chestplate, leftPauldron, rightPauldron, leftBoot, rightBoot
                ];

                const swordPivot = new BABYLON.TransformNode("swordPivot", scene);
                swordPivot.parent = rightArm;
                swordPivot.position.set(0, -0.4, 0.15); 
                swordPivot.rotation.x = Math.PI / 2.2;  

                const swordHandle = BABYLON.MeshBuilder.CreateBox("swordHandle", {width: 0.1, height: 0.3, depth: 0.1}, scene);
                swordHandle.parent = swordPivot;
                swordHandle.position.y = -0.15;
                swordHandle.material = materials.swordHandle;

                const swordGuard = BABYLON.MeshBuilder.CreateBox("swordGuard", {width: 0.4, height: 0.1, depth: 0.15}, scene);
                swordGuard.parent = swordPivot;
                swordGuard.position.y = 0.05;
                swordGuard.material = materials.swordHandle;

                const swordBlade = BABYLON.MeshBuilder.CreateBox("swordBlade", {width: 0.2, height: 0.9, depth: 0.05}, scene);
                swordBlade.parent = swordPivot;
                swordBlade.position.y = 0.55;
                swordBlade.material = materials.swordBlade;

                [body, head, leftArm, rightArm, leftLeg, rightLeg, swordHandle, swordGuard, swordBlade, ...armorParts].forEach(part => shadowGenerator.addShadowCaster(part, true));
                
                // --- GUI DO JOGADOR (Identificador Flutuante do Último Alvo) ---
                const playerRect = new BABYLON.GUI.Rectangle();
                playerRect.width = "220px";
                playerRect.adaptHeightToChildren = true;
                playerRect.background = "rgba(0, 0, 0, 0.75)";
                playerRect.thickness = 2;
                playerRect.color = "rgba(52, 152, 219, 0.8)"; // Borda azul para diferenciar do Inimigo
                playerRect.cornerRadius = 8;

                const playerLabel = new BABYLON.GUI.TextBlock();
                playerLabel.text = "-";
                playerLabel.color = "#3498db"; // Texto Azul claro
                playerLabel.fontSize = 18; 
                playerLabel.fontWeight = "bold";
                playerLabel.textWrapping = BABYLON.GUI.TextWrapping.WordWrap;
                playerLabel.resizeToFit = true;
                playerLabel.paddingTop = "8px";
                playerLabel.paddingBottom = "8px";
                playerLabel.paddingLeft = "10px";
                playerLabel.paddingRight = "10px";

                playerRect.addControl(playerLabel);
                advancedTexture.addControl(playerRect);
                playerRect.linkWithMesh(head);
                playerRect.linkOffsetY = -150; // Posicionado bem acima da crista do capacete
                
                playerParts = { root: playerRoot, body, head, leftArm, rightArm, leftLeg, rightLeg, armorParts, guiLabel: playerLabel, isAttacking: false };
                return playerRoot;
            }

            // --- MODELAGEM BASE DOS INIMIGOS ---
            function initTrollBase() {
                baseTrollParts.body = BABYLON.MeshBuilder.CreateBox("tb_body", {width: 1.6, height: 1.6, depth: 1.0}, scene);
                baseTrollParts.head = BABYLON.MeshBuilder.CreateBox("tb_head", {size: 0.9}, scene);
                baseTrollParts.arm = BABYLON.MeshBuilder.CreateBox("tb_arm", {width: 0.6, height: 1.6, depth: 0.6}, scene);
                baseTrollParts.leg = BABYLON.MeshBuilder.CreateBox("tb_leg", {width: 0.6, height: 0.8, depth: 0.6}, scene);
                
                baseTrollParts.eye = BABYLON.MeshBuilder.CreateBox("tb_eye", {width: 0.15, height: 0.15, depth: 0.05}, scene);
                baseTrollParts.eye.material = materials.eye;

                Object.values(baseTrollParts).forEach(mesh => {
                    if(mesh !== baseTrollParts.eye) {
                        mesh.material = materials.trollBase;
                        mesh.registerInstancedBuffer("color", 4);
                        shadowGenerator.addShadowCaster(mesh, true);
                    }
                    mesh.isVisible = false;
                });
            }

            function initGoblinBase() {
                baseGoblinParts.body = BABYLON.MeshBuilder.CreateBox("gb_body", {width: 0.6, height: 1.0, depth: 0.4}, scene);
                baseGoblinParts.head = BABYLON.MeshBuilder.CreateBox("gb_head", {size: 0.7}, scene);
                baseGoblinParts.arm = BABYLON.MeshBuilder.CreateBox("gb_arm", {width: 0.2, height: 1.0, depth: 0.2}, scene);
                baseGoblinParts.leg = BABYLON.MeshBuilder.CreateBox("gb_leg", {width: 0.2, height: 0.8, depth: 0.2}, scene);
                
                baseGoblinParts.eye = BABYLON.MeshBuilder.CreateBox("gb_eye", {width: 0.1, height: 0.1, depth: 0.05}, scene);
                baseGoblinParts.eye.material = materials.eye;

                Object.values(baseGoblinParts).forEach(mesh => {
                    if(mesh !== baseGoblinParts.eye) {
                        mesh.material = materials.trollBase; 
                        mesh.registerInstancedBuffer("color", 4);
                        shadowGenerator.addShadowCaster(mesh, true);
                    }
                    mesh.isVisible = false;
                });
            }

            function spawnTroll(textTarget, pos) {
                const root = new BABYLON.TransformNode(`troll_${textTarget}`, scene);
                root.position = pos;

                const s = 0.9 + Math.random() * 0.3; 
                root.scaling.set(s, s, s);
                root.rotation.y = Math.random() * Math.PI * 2; 

                const greenTone = 0.3 + Math.random() * 0.4; 
                const skinColor = new BABYLON.Color4(0.1, greenTone, 0.1, 1);
                const clothColor = new BABYLON.Color4(0.3, 0.2, 0.15, 1); 

                let meshes = []; 

                const lLegPivot = new BABYLON.TransformNode("lLegP", scene);
                lLegPivot.parent = root; lLegPivot.position.set(-0.45, 0.8, 0);
                const lLeg = baseTrollParts.leg.createInstance("lLeg");
                lLeg.parent = lLegPivot; lLeg.position.y = -0.4; lLeg.instancedBuffers.color = clothColor;
                meshes.push(lLeg);

                const rLegPivot = new BABYLON.TransformNode("rLegP", scene);
                rLegPivot.parent = root; rLegPivot.position.set(0.45, 0.8, 0);
                const rLeg = baseTrollParts.leg.createInstance("rLeg");
                rLeg.parent = rLegPivot; rLeg.position.y = -0.4; rLeg.instancedBuffers.color = clothColor;
                meshes.push(rLeg);

                const bodyPivot = new BABYLON.TransformNode("bodyP", scene);
                bodyPivot.parent = root; bodyPivot.position.set(0, 1.6, 0);
                const body = baseTrollParts.body.createInstance("body");
                body.parent = bodyPivot; body.position.y = 0.8; body.instancedBuffers.color = clothColor;
                meshes.push(body);

                const headPivot = new BABYLON.TransformNode("headP", scene);
                headPivot.parent = bodyPivot; headPivot.position.set(0, 1.6, 0);
                const head = baseTrollParts.head.createInstance("head");
                head.parent = headPivot; head.position.y = 0.45; head.instancedBuffers.color = skinColor;
                head.position.z = 0.2; 
                meshes.push(head);

                const eyeL = baseTrollParts.eye.createInstance("tEyeL");
                eyeL.parent = head; eyeL.position.set(-0.2, 0.1, 0.46);
                const eyeR = baseTrollParts.eye.createInstance("tEyeR");
                eyeR.parent = head; eyeR.position.set(0.2, 0.1, 0.46);

                const lArmPivot = new BABYLON.TransformNode("lArmP", scene);
                lArmPivot.parent = bodyPivot; lArmPivot.position.set(-1.1, 1.4, 0);
                const lArm = baseTrollParts.arm.createInstance("lArm");
                lArm.parent = lArmPivot; lArm.position.y = -0.8; lArm.instancedBuffers.color = skinColor;
                meshes.push(lArm);

                const rArmPivot = new BABYLON.TransformNode("rArmP", scene);
                rArmPivot.parent = bodyPivot; rArmPivot.position.set(1.1, 1.4, 0);
                const rArm = baseTrollParts.arm.createInstance("rArm");
                rArm.parent = rArmPivot; rArm.position.y = -0.8; rArm.instancedBuffers.color = skinColor;
                meshes.push(rArm);

                const rect = new BABYLON.GUI.Rectangle();
                rect.width = "220px";
                rect.adaptHeightToChildren = true;
                rect.background = "rgba(0, 0, 0, 0.75)";
                rect.thickness = 2;
                rect.color = "rgba(255, 255, 255, 0.3)";
                rect.cornerRadius = 8;

                const label = new BABYLON.GUI.TextBlock();
                label.text = textTarget;
                label.color = "#ecf0f1"; 
                label.fontSize = 18; 
                label.fontWeight = "bold";
                label.textWrapping = BABYLON.GUI.TextWrapping.WordWrap;
                label.resizeToFit = true;
                label.paddingTop = "8px";
                label.paddingBottom = "8px";
                label.paddingLeft = "10px";
                label.paddingRight = "10px";

                rect.addControl(label);
                advancedTexture.addControl(rect);
                rect.linkWithMesh(head);
                rect.linkOffsetY = -90;

                enemies.push({ 
                    type: "troll",
                    root, bodyPivot, lArmPivot, rArmPivot, lLegPivot, rLegPivot, head, 
                    meshes, guiLabel: rect, targetText: textTarget, 
                    isHit: false, isAttacking: false,
                    idleOffset: Math.random() * Math.PI * 2, 
                    originalColors: { skin: skinColor, cloth: clothColor },
                    originPos: pos.clone(),
                    targetPos: pos.clone(),
                    moveTimer: Math.random() * 3
                });
            }

            function spawnGoblin(textTarget, pos) {
                const root = new BABYLON.TransformNode(`goblin_${textTarget}`, scene);
                root.position = pos;

                const s = 0.85 + Math.random() * 0.2; 
                root.scaling.set(s, s, s);
                root.rotation.y = Math.random() * Math.PI * 2; 

                const skinColor = new BABYLON.Color4(0.5 + Math.random()*0.2, 0.8, 0.2, 1);
                const clothColor = new BABYLON.Color4(0.2, 0.15, 0.25, 1); 

                let meshes = [];

                const lLegPivot = new BABYLON.TransformNode("glLegP", scene);
                lLegPivot.parent = root; lLegPivot.position.set(-0.15, 0.8, 0);
                const lLeg = baseGoblinParts.leg.createInstance("glLeg");
                lLeg.parent = lLegPivot; lLeg.position.y = -0.4; lLeg.instancedBuffers.color = clothColor;
                meshes.push(lLeg);

                const rLegPivot = new BABYLON.TransformNode("grLegP", scene);
                rLegPivot.parent = root; rLegPivot.position.set(0.15, 0.8, 0);
                const rLeg = baseGoblinParts.leg.createInstance("grLeg");
                rLeg.parent = rLegPivot; rLeg.position.y = -0.4; rLeg.instancedBuffers.color = clothColor;
                meshes.push(rLeg);

                const bodyPivot = new BABYLON.TransformNode("gbodyP", scene);
                bodyPivot.parent = root; bodyPivot.position.set(0, 0.8, 0);
                const body = baseGoblinParts.body.createInstance("gbody");
                body.parent = bodyPivot; body.position.y = 0.5; body.instancedBuffers.color = clothColor;
                meshes.push(body);

                const headPivot = new BABYLON.TransformNode("gheadP", scene);
                headPivot.parent = bodyPivot; headPivot.position.set(0, 1.0, 0);
                const head = baseGoblinParts.head.createInstance("ghead");
                head.parent = headPivot; head.position.y = 0.35; head.instancedBuffers.color = skinColor;
                head.position.z = 0.1;
                meshes.push(head);

                const eyeL = baseGoblinParts.eye.createInstance("gEyeL");
                eyeL.parent = head; eyeL.position.set(-0.15, 0.05, 0.36);
                const eyeR = baseGoblinParts.eye.createInstance("gEyeR");
                eyeR.parent = head; eyeR.position.set(0.15, 0.05, 0.36);

                const lArmPivot = new BABYLON.TransformNode("glArmP", scene);
                lArmPivot.parent = bodyPivot; lArmPivot.position.set(-0.4, 0.9, 0);
                const lArm = baseGoblinParts.arm.createInstance("glArm");
                lArm.parent = lArmPivot; lArm.position.y = -0.5; lArm.instancedBuffers.color = skinColor;
                meshes.push(lArm);

                const rArmPivot = new BABYLON.TransformNode("grArmP", scene);
                rArmPivot.parent = bodyPivot; rArmPivot.position.set(0.4, 0.9, 0);
                const rArm = baseGoblinParts.arm.createInstance("grArm");
                rArm.parent = rArmPivot; rArm.position.y = -0.5; rArm.instancedBuffers.color = skinColor;
                meshes.push(rArm);

                const rect = new BABYLON.GUI.Rectangle();
                rect.width = "200px";
                rect.adaptHeightToChildren = true;
                rect.background = "rgba(0, 0, 0, 0.75)";
                rect.thickness = 2;
                rect.color = "rgba(255, 255, 255, 0.3)";
                rect.cornerRadius = 8;

                const label = new BABYLON.GUI.TextBlock();
                label.text = textTarget;
                label.color = "#ecf0f1"; 
                label.fontSize = 16; 
                label.fontWeight = "bold";
                label.textWrapping = BABYLON.GUI.TextWrapping.WordWrap;
                label.resizeToFit = true;
                label.paddingTop = "6px";
                label.paddingBottom = "6px";
                label.paddingLeft = "8px";
                label.paddingRight = "8px";

                rect.addControl(label);
                advancedTexture.addControl(rect);
                rect.linkWithMesh(head);
                rect.linkOffsetY = -70;

                enemies.push({ 
                    type: "goblin",
                    root, bodyPivot, lArmPivot, rArmPivot, lLegPivot, rLegPivot, head, 
                    meshes, guiLabel: rect, targetText: textTarget, 
                    isHit: false, isAttacking: false,
                    idleOffset: Math.random() * Math.PI * 2,
                    originalColors: { skin: skinColor, cloth: clothColor },
                    originPos: pos.clone(), 
                    targetPos: pos.clone(),
                    moveTimer: Math.random() * 2
                });
            }

            function checkSceneryCollision(x, z, colRadius) {
                for (let i = 0; i < sceneryItems.length; i++) {
                    let s = sceneryItems[i];
                    let dist = Math.sqrt(Math.pow(x - s.x, 2) + Math.pow(z - s.z, 2));
                    if (dist < s.radius + colRadius) return true;
                }
                return false;
            }

            // --- AMBIENTE ---
            function createEnvironment() {
                const size = 40;
                const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: size, height: size}, scene);
                ground.material = materials.grass; ground.receiveShadows = true;

                const baseWall = BABYLON.MeshBuilder.CreateBox("baseWall", {size: 1}, scene); baseWall.material = materials.stone; baseWall.isVisible = false;
                const baseTrunk = BABYLON.MeshBuilder.CreateBox("baseTrunk", {width: 1, height: 3, depth: 1}, scene); baseTrunk.material = materials.trunk; baseTrunk.isVisible = false;
                const baseLeaf = BABYLON.MeshBuilder.CreateBox("baseLeaf", {width: 3, height: 3, depth: 3}, scene); baseLeaf.material = materials.leaves; baseLeaf.isVisible = false;
                const baseRock = BABYLON.MeshBuilder.CreateBox("baseRock", {size: 1}, scene); baseRock.material = materials.rock; baseRock.isVisible = false;
                const baseBush = BABYLON.MeshBuilder.CreateBox("baseBush", {size: 1}, scene); baseBush.material = materials.bush; baseBush.isVisible = false;

                [baseWall, baseTrunk, baseLeaf, baseRock, baseBush].forEach(m => shadowGenerator.addShadowCaster(m, true));

                for (let x = -20; x <= 20; x++) {
                    for (let y = 0; y < 2; y++) {
                        baseWall.createInstance("wN").position.set(x, y + 0.5, 20);
                        baseWall.createInstance("wS").position.set(x, y + 0.5, -20);
                    }
                }
                for (let z = -19; z <= 19; z++) {
                    for (let y = 0; y < 2; y++) {
                        baseWall.createInstance("wE").position.set(20, y + 0.5, z);
                        baseWall.createInstance("wW").position.set(-20, y + 0.5, z);
                    }
                }

                sceneryItems = []; 
                for (let i = 0; i < 70; i++) {
                    let rx = Math.floor((Math.random() - 0.5) * 36);
                    let rz = Math.floor((Math.random() - 0.5) * 36);
                    if (Math.abs(rx) < 12 && Math.abs(rz) < 12) continue; 
                    let type = Math.random();
                    if (type < 0.25) {
                        baseTrunk.createInstance("trunk").position.set(rx, 1.5, rz);
                        baseLeaf.createInstance("leaf").position.set(rx, 4.5, rz);
                        sceneryItems.push({ x: rx, z: rz, radius: 1.2 }); 
                    } else if (type < 0.5) {
                        baseRock.createInstance("rock").position.set(rx, 0.5, rz);
                        sceneryItems.push({ x: rx, z: rz, radius: 0.7 }); 
                    } else if (type < 0.75) {
                        let bush = baseBush.createInstance("bush"); bush.position.set(rx, 0.5, rz); bush.scaling.set(2, 1, 2);
                        sceneryItems.push({ x: rx, z: rz, radius: 1.0 }); 
                    }
                }
            }

            function createScene() {
                scene = new BABYLON.Scene(engine);
                scene.clearColor = new BABYLON.Color4(0.4, 0.7, 0.9, 1);
                camera = new BABYLON.UniversalCamera("camera", new BABYLON.Vector3(0, 25, -30), scene);
                camera.setTarget(BABYLON.Vector3.Zero());
                camera.inputs.clear();
                new BABYLON.HemisphericLight("ambient", new BABYLON.Vector3(0, 1, 0), scene).intensity = 0.4;
                const sun = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-1, -2, -1), scene);
                sun.position = new BABYLON.Vector3(20, 40, 20); sun.intensity = 0.9;
                shadowGenerator = new BABYLON.ShadowGenerator(1024, sun);
                shadowGenerator.useBlurExponentialShadowMap = true; shadowGenerator.blurKernel = 32;
                
                advancedTexture = BABYLON.GUI.AdvancedDynamicTexture.CreateFullscreenUI("UI");
                
                setupMaterials();
                player = createPlayer();
                initTrollBase();
                initGoblinBase();
                createEnvironment();
                
                scene.actionManager = new BABYLON.ActionManager(scene);
                scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, (e) => inputMap[e.sourceEvent.key.toLowerCase()] = true));
                scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, (e) => inputMap[e.sourceEvent.key.toLowerCase()] = false));
                scene.onBeforeRenderObservable.add(gameLoop);

                document.getElementById("btn-freecam").addEventListener("click", () => {
                    isFreeCam = !isFreeCam;
                    const btn = document.getElementById("btn-freecam");
                    if (isFreeCam) {
                        btn.classList.add("active");
                        btn.innerHTML = '<i class="fa-solid fa-video-slash"></i> Sair Câmera Livre';
                        camera.inputs.addMouse();
                        camera.inputs.addKeyboard();
                        camera.attachControl(canvas, true);
                        camera.keysUp.push(87); camera.keysDown.push(83); camera.keysLeft.push(65); camera.keysRight.push(68);
                        camera.speed = 0.8;
                    } else {
                        btn.classList.remove("active");
                        btn.innerHTML = '<i class="fa-solid fa-video"></i> Câmera Livre (Debug)';
                        camera.inputs.clear();
                        camera.detachControl();
                        camera.setTarget(player.position.clone());
                    }
                });
                return scene;
            }

            let walkTime = 0;
            let time = 0;

            function gameLoop() {
                if (!gameState.isPlaying) return;
                time += 0.05;
                const speed = 0.16;
                let move = new BABYLON.Vector3(0, 0, 0);
                if (!isFreeCam) {
                    if (inputMap["w"]) move.z += 1;
                    if (inputMap["s"]) move.z -= 1;
                    if (inputMap["a"]) move.x -= 1;
                    if (inputMap["d"]) move.x += 1;
                }
                const isMoving = move.length() > 0;
                if (isMoving) {
                    move.normalize().scaleInPlace(speed);
                    let nextPos = player.position.add(move);
                    if (!checkSceneryCollision(nextPos.x, nextPos.z, 0.6)) player.position = nextPos;
                    const targetAngle = Math.atan2(move.x, move.z);
                    player.rotation.y = BABYLON.Scalar.LerpAngle(player.rotation.y, targetAngle, 0.15);
                    player.position.x = Math.max(-19, Math.min(19, player.position.x));
                    player.position.z = Math.max(-19, Math.min(19, player.position.z));
                }

                if (isMoving) {
                    walkTime += 0.15;
                    const armSwing = Math.sin(walkTime) * 0.6;
                    playerParts.leftLeg.rotation.x = Math.cos(walkTime) * 0.6;
                    playerParts.rightLeg.rotation.x = -Math.cos(walkTime) * 0.6;
                    playerParts.leftArm.rotation.x = -armSwing; 
                    if (!playerParts.isAttacking) playerParts.rightArm.rotation.x = armSwing;
                    playerParts.body.position.y = 1.2 + Math.abs(Math.sin(walkTime * 2)) * 0.1;
                } else {
                    walkTime = 0;
                    const lerp = 0.15;
                    playerParts.leftLeg.rotation.x = BABYLON.Scalar.Lerp(playerParts.leftLeg.rotation.x, 0, lerp);
                    playerParts.rightLeg.rotation.x = BABYLON.Scalar.Lerp(playerParts.rightLeg.rotation.x, 0, lerp);
                    playerParts.leftArm.rotation.x = BABYLON.Scalar.Lerp(playerParts.leftArm.rotation.x, 0, lerp);
                    if (!playerParts.isAttacking) playerParts.rightArm.rotation.x = BABYLON.Scalar.Lerp(playerParts.rightArm.rotation.x, 0, lerp);
                    playerParts.body.position.y = BABYLON.Scalar.Lerp(playerParts.body.position.y, 1.2, lerp);
                }

                if (!isFreeCam) {
                    const targetCamPos = player.position.clone();
                    targetCamPos.addInPlace(new BABYLON.Vector3(0, 25, -30));
                    camera.position = BABYLON.Vector3.Lerp(camera.position, targetCamPos, 0.1);
                }
                if (cameraShake.lengthSquared() > 0.001) {
                    camera.position.addInPlace(cameraShake);
                    cameraShake.scaleInPlace(-0.75); 
                }

                enemies.forEach(enemy => {
                    if (!enemy.isAttacking && !enemy.isHit) {
                        enemy.lLegPivot.rotation.x = 0;
                        enemy.rLegPivot.rotation.x = 0;
                        if (enemy.type === "troll") {
                            enemy.bodyPivot.scaling.y = 1 + Math.sin(time + enemy.idleOffset) * 0.04; 
                            enemy.lArmPivot.rotation.x = Math.sin(time + enemy.idleOffset) * 0.05; 
                            enemy.rArmPivot.rotation.x = -Math.sin(time + enemy.idleOffset) * 0.05;
                            enemy.bodyPivot.position.y = 1.6;
                        } else {
                            enemy.lArmPivot.rotation.x = Math.sin(time * 3 + enemy.idleOffset) * 0.15;
                            enemy.rArmPivot.rotation.x = -Math.sin(time * 3 + enemy.idleOffset) * 0.15;
                            enemy.bodyPivot.position.y = 0.8;
                        }
                        const lookAngle = Math.atan2(player.position.x - enemy.root.position.x, player.position.z - enemy.root.position.z);
                        enemy.root.rotation.y = BABYLON.Scalar.LerpAngle(enemy.root.rotation.y, lookAngle, 0.05);
                    }
                    const colRadius = enemy.type === "troll" ? 2.5 : 1.8;
                    if (!enemy.isHit && BABYLON.Vector3.Distance(player.position, enemy.root.position) < colRadius) handleEnemyInteraction(enemy);
                });
            }

            function playPlayerAttack() {
                if (playerParts.isAttacking) return;
                playerParts.isAttacking = true;
                const atkAnim = new BABYLON.Animation("playerAtk", "rotation.x", 60, BABYLON.Animation.ANIMATIONTYPE_FLOAT);
                atkAnim.setKeys([{frame: 0, value: playerParts.rightArm.rotation.x}, {frame: 8, value: -2.5}, {frame: 16, value: 0}]);
                scene.beginDirectAnimation(playerParts.rightArm, [atkAnim], 0, 16, false, 1.5, () => {
                    playerParts.isAttacking = false;
                });
            }

            function handleEnemyInteraction(enemy) {
                enemy.isHit = true; 
                const correct = gameState.sortedTargets[gameState.currentIndex];
                playPlayerAttack();
                if (enemy.targetText === correct) {
                    showMessage("CERTO!", "success");
                    enemy.meshes.forEach(m => m.instancedBuffers.color = new BABYLON.Color4(1, 1, 1, 1));
                    setTimeout(() => {
                        if (enemy.type === "troll") {
                            const anim = new BABYLON.Animation("shrink", "scaling", 60, BABYLON.Animation.ANIMATIONTYPE_VECTOR3);
                            anim.setKeys([{frame: 0, value: enemy.root.scaling.clone()}, {frame: 20, value: BABYLON.Vector3.Zero()}]);
                            scene.beginDirectAnimation(enemy.root, [anim], 0, 20, false, 1, () => {
                                enemy.guiLabel.dispose(); enemy.root.dispose(); 
                            });
                        } else {
                            const anim = new BABYLON.Animation("pop", "scaling", 60, BABYLON.Animation.ANIMATIONTYPE_VECTOR3);
                            anim.setKeys([{frame: 0, value: enemy.root.scaling.clone()}, {frame: 8, value: enemy.root.scaling.scale(1.5)}, {frame: 12, value: BABYLON.Vector3.Zero()}]);
                            scene.beginDirectAnimation(enemy.root, [anim], 0, 12, false, 1, () => {
                                enemy.guiLabel.dispose(); enemy.root.dispose(); 
                            });
                        }
                        gameState.currentIndex++;
                        updateHUD();
                        if (gameState.currentIndex >= gameState.sortedTargets.length) {
                            gameState.isPlaying = false;
                            setTimeout(() => { gameState.round++; startRound(); }, 1200);
                        }
                    }, 150);
                } else {
                    enemy.isAttacking = true;
                    gameState.lives--;
                    updateHUD();
                    enemy.meshes.forEach(m => m.instancedBuffers.color = new BABYLON.Color4(1, 0, 0, 1));
                    setTimeout(() => {
                        if (enemy.type === "troll") {
                            const atkAnim = new BABYLON.Animation("trollAtk", "rotation.x", 60, BABYLON.Animation.ANIMATIONTYPE_FLOAT);
                            atkAnim.setKeys([{frame: 0, value: enemy.rArmPivot.rotation.x}, {frame: 10, value: -2.0}, {frame: 15, value: 0.8}, {frame: 30, value: 0}]);
                            scene.beginDirectAnimation(enemy.rArmPivot, [atkAnim], 0, 30, false, 1.5, () => {
                                enemy.isAttacking = false;
                                if(gameState.lives > 0) {
                                    enemy.isHit = false;
                                    enemy.meshes.forEach((m, idx) => m.instancedBuffers.color = (idx < 3) ? enemy.originalColors.cloth : enemy.originalColors.skin);
                                }
                            });
                            setTimeout(() => {
                                cameraShake = new BABYLON.Vector3((Math.random()-0.5)*1.5, (Math.random()-0.5)*1.5, (Math.random()-0.5)*1.5);
                                playerDamageFeedback();
                                resolveErrorPenalty("troll");
                            }, 250); 
                        } else {
                            const dashAnim = new BABYLON.Animation("goblinDash", "position", 60, BABYLON.Animation.ANIMATIONTYPE_VECTOR3);
                            const oPos = enemy.root.position.clone();
                            const dir = player.position.subtract(oPos).normalize();
                            const fPos = oPos.add(dir.scale(1.2)); 
                            dashAnim.setKeys([{frame: 0, value: oPos}, {frame: 8, value: fPos}, {frame: 20, value: oPos}]);
                            const armAnim = new BABYLON.Animation("goblinArm", "rotation.x", 60, BABYLON.Animation.ANIMATIONTYPE_FLOAT);
                            armAnim.setKeys([{frame: 0, value: 0}, {frame: 8, value: -1.8}, {frame: 20, value: 0}]);
                            scene.beginDirectAnimation(enemy.root, [dashAnim], 0, 20, false, 2);
                            scene.beginDirectAnimation(enemy.rArmPivot, [armAnim], 0, 20, false, 2, () => {
                                enemy.isAttacking = false;
                                if(gameState.lives > 0) {
                                    enemy.isHit = false;
                                    enemy.meshes.forEach((m, idx) => m.instancedBuffers.color = (idx < 3) ? enemy.originalColors.cloth : enemy.originalColors.skin);
                                }
                            });
                            setTimeout(() => {
                                cameraShake = new BABYLON.Vector3((Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8);
                                playerDamageFeedback();
                                resolveErrorPenalty("goblin");
                            }, 100); 
                        }
                    }, 200); 
                }
            }

            function resolveErrorPenalty(enemyType) {
                if (gameState.lives <= 0) {
                    showMessage("GAME OVER", "error");
                    gameState.isPlaying = false;
                    setTimeout(() => { gameState.round = 1; gameState.lives = 3; startRound(); }, 2500);
                } else {
                    showMessage(enemyType === "troll" ? "ESMAGADO!" : "GOLPEADO!", "error");
                    player.position.set(0, 0, 0); 
                }
            }

            function playerDamageFeedback() {
                const pParts = [playerParts.body, playerParts.head, playerParts.leftArm, playerParts.rightArm, playerParts.leftLeg, playerParts.rightLeg, ...playerParts.armorParts];
                const origMats = pParts.map(p => p.material);
                pParts.forEach(p => p.material = materials.hitEffect);
                setTimeout(() => pParts.forEach((p, i) => p.material = origMats[i]), 200);
            }

            function startRound() {
                enemies.forEach(e => { e.root.dispose(); e.guiLabel.dispose(); });
                enemies = [];
                player.position.set(0, 0, 0);
                if (playerParts && playerParts.rightArm) {
                    playerParts.isAttacking = false;
                    playerParts.rightArm.rotation.x = 0;
                }
                gameState.targets = [];
                let availablePhrases = [...phraseBank];
                while (gameState.targets.length < gameState.enemiesPerRound && availablePhrases.length > 0) {
                    let idx = Math.floor(Math.random() * availablePhrases.length);
                    gameState.targets.push(availablePhrases[idx]);
                    availablePhrases.splice(idx, 1);
                }
                gameState.sortedTargets = [...gameState.targets].sort((a, b) => a.localeCompare(b, 'pt-BR'));
                gameState.currentIndex = 0;
                gameState.isPlaying = true;
                let spawnedPositions = [];
                const minDistance = 7; 
                for (let i = 0; i < gameState.enemiesPerRound; i++) {
                    let rx, rz;
                    let validPosition = false;
                    let attempts = 0;
                    while (!validPosition && attempts < 100) {
                        rx = (Math.random() - 0.5) * 34; rz = (Math.random() - 0.5) * 34;
                        attempts++;
                        if (Math.abs(rx) < 6 && Math.abs(rz) < 6) continue;
                        let tooClose = false;
                        for (let pos of spawnedPositions) {
                            let dist = Math.sqrt(Math.pow(rx - pos.x, 2) + Math.pow(rz - pos.z, 2));
                            if (dist < minDistance) { tooClose = true; break; }
                        }
                        if (!tooClose && !checkSceneryCollision(rx, rz, 1.2)) validPosition = true; 
                    }
                    let finalPos = new BABYLON.Vector3(rx, 0, rz);
                    if (Math.random() > 0.5) spawnTroll(gameState.targets[i], finalPos); else spawnGoblin(gameState.targets[i], finalPos);
                    spawnedPositions.push({ x: rx, z: rz }); 
                }
                updateHUD();
                showMessage(`Rodada ${gameState.round}`, "level-up");
            }

            createScene();
            engine.runRenderLoop(() => scene.render());
            window.addEventListener("resize", () => engine.resize());
            startRound();
        });
    </script>
