<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exploradores da Amazônia</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Nunito para o visual estilo Duolingo -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Phaser 3 via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <link rel="stylesheet" href="./styles/eateach.css" />
    <script defer src="./scripts/eateach.js" type="module"></script>
</head>
<body>

    <!-- Contêiner do Jogo (Phaser) -->
    <div id="game-container"></div>

    <!-- Interface HTML (Menus) -->
    <div id="ui-layer">
        
        <!-- Tela Inicial -->
        <div id="screen-start" class="screen active">
            <div class="big-icon"><i class="fa-solid fa-leaf"></i></div>
            <h1>Exploradores da Amazônia</h1>
            <p class="desc">Aprenda brincando no labirinto da floresta! Colete apenas as palavras corretas da categoria.</p>
            <button class="btn" onclick="startGame()"><i class="fa-solid fa-play"></i> Começar Aventura</button>
        </div>

        <!-- Tela de Vitória da Fase -->
        <div id="screen-win" class="screen">
            <div class="big-icon"><i class="fa-solid fa-star"></i></div>
            <h1>Excelente!</h1>
            <h2>Fase Concluída</h2>
            <div class="stats-box">
                <div class="stat-item"><i class="fa-solid fa-gem"></i> <span id="win-score">0</span></div>
                <div class="stat-item"><i class="fa-solid fa-heart" style="color:var(--red-error)"></i> <span id="win-lives">3</span></div>
            </div>
            <button class="btn btn-blue" onclick="nextLevel()"><i class="fa-solid fa-arrow-right"></i> Próxima Fase</button>
        </div>

        <!-- Tela de Derrota -->
        <div id="screen-lose" class="screen">
            <div class="big-icon lose-icon"><i class="fa-solid fa-face-frown"></i></div>
            <h1 style="color: var(--red-error);">Poxa Vida!</h1>
            <p class="desc">Você perdeu todas as vidas. Tente novamente!</p>
            <button class="btn btn-red" onclick="restartGame()"><i class="fa-solid fa-rotate-right"></i> Tentar de Novo</button>
        </div>

        <!-- Tela de Jogo Concluído (Fim) -->
        <div id="screen-end" class="screen">
            <div class="big-icon"><i class="fa-solid fa-trophy" style="color: var(--yellow-warm)"></i></div>
            <h1>Campeão!</h1>
            <p class="desc">Você completou todas as fases e é um verdadeiro explorador da Amazônia!</p>
            <div class="stats-box">
                <div class="stat-item"><i class="fa-solid fa-gem"></i> <span id="end-score">0</span></div>
            </div>
            <button class="btn" onclick="restartGame()"><i class="fa-solid fa-house"></i> Início</button>
        </div>

    </div>
</body>
</html>
