<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapo Sabido - Jogo Educativo</title>
    
    <!-- CSS Separado (Não inline) -->
    <style>
        /* Reset básico e estilos gerais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #E5E5E5; /* Cor de fundo neutra estilo Duolingo */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container principal do jogo */
        #game-container {
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
            background-color: #1CB0F6; /* Azul água fallback */
        }

        /* Dica de controles abaixo do jogo */
        #controls-hint {
            position: absolute;
            bottom: 20px;
            color: #777;
            font-weight: bold;
            text-align: center;
            font-size: 14px;
        }
        
        kbd {
            background-color: #eee;
            border-radius: 3px;
            border: 1px solid #b4b4b4;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.2), 0 2px 0 0 rgba(255, 255, 255, 0.7) inset;
            color: #333;
            display: inline-block;
            font-size: 0.85em;
            font-weight: 700;
            line-height: 1;
            padding: 2px 4px;
            white-space: nowrap;
        }
    </style>

    <!-- Importando o Phaser 3 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
</head>
<body>

    <div id="game-container"></div>
    <div id="controls-hint">Aguarde o momento certo e use <kbd>ESPAÇO</kbd> ou <kbd>↑</kbd> para pular!</div>

    <!-- Script principal do jogo -->
    <script>
        // ==========================================
        // DADOS DO JOGO (PERGUNTAS)
        // ==========================================
        const perguntas = [
            { 
                texto: "Qual é o resultado de 7 x 8?", 
                opcoes: ["48", "54", "56", "64"], 
                correta: 2 // Índice da resposta correta (0 a 3)
            },
            { 
                texto: "Qual é a capital do Brasil?", 
                opcoes: ["Rio de Janeiro", "São Paulo", "Salvador", "Brasília"], 
                correta: 3 
            },
            { 
                texto: "Qual destes animais é um mamífero?", 
                opcoes: ["Tubarão", "Galinha", "Morcego", "Sapo"], 
                correta: 2 
            },
            { 
                texto: "Quantos continentes existem no mundo?", 
                opcoes: ["5", "6", "7", "8"], 
                correta: 1 // América, Europa, Ásia, África, Oceania, Antártida
            },
            { 
                texto: "Qual é o maior planeta do Sistema Solar?", 
                opcoes: ["Terra", "Marte", "Saturno", "Júpiter"], 
                correta: 3 
            }
        ];

        // ==========================================
        // CONFIGURAÇÕES VISUAIS (Flat Design / Duolingo Style)
        // ==========================================
        const CORES = {
            agua: 0x1CB0F6,
            aguaEscura: 0x1483B8,
            sapo: 0x58CC02,
            sapoSombra: 0x46A302,
            jangada: 0xC68B59,
            jangadaSombra: 0xA06B40,
            textoBase: '#4B4B4B',
            textoBranco: '#FFFFFF',
            cachoeira: 0xFFFFFF,
            erro: 0xFF4B4B,
            acerto: 0x58CC02
        };

        const POSICOES_X = [125, 308, 491, 675]; // Centros das 4 raias

        // ==========================================
        // CENA 1: BOOT (Carregamento e Geração de Gráficos)
        // ==========================================
        class BootScene extends Phaser.Scene {
            constructor() { super('BootScene'); }

            create() {
                // Gerar texturas proceduralmente (sem precisar de imagens externas)
                this.gerarTexturas();
                this.scene.start('GameScene');
            }

            gerarTexturas() {
                let g = this.make.graphics({x: 0, y: 0}, false);

                // 1. Jangada (Retângulo arredondado com detalhes)
                g.fillStyle(CORES.jangadaSombra, 1);
                g.fillRoundedRect(0, 10, 160, 100, 16); // Sombra 3D
                g.fillStyle(CORES.jangada, 1);
                g.fillRoundedRect(0, 0, 160, 100, 16); // Topo
                g.fillStyle(CORES.jangadaSombra, 0.5);
                g.fillRect(30, 0, 5, 100); // Linhas da madeira
                g.fillRect(125, 0, 5, 100);
                g.generateTexture('jangada', 160, 110);

                // 2. Sapo
                g.clear();
                g.fillStyle(CORES.sapoSombra, 1);
                g.fillCircle(30, 35, 30); // Sombra do corpo
                g.fillStyle(CORES.sapo, 1);
                g.fillCircle(30, 30, 30); // Corpo
                g.fillCircle(15, 10, 12); // Olho esquerdo base
                g.fillCircle(45, 10, 12); // Olho direito base
                g.fillStyle(0xFFFFFF, 1);
                g.fillCircle(15, 10, 8); // Olho esquerdo branco
                g.fillCircle(45, 10, 8); // Olho direito branco
                g.fillStyle(0x000000, 1);
                g.fillCircle(15, 10, 4); // Pupila esq
                g.fillCircle(45, 10, 4); // Pupila dir
                g.generateTexture('sapo', 60, 70);

                // 3. Rio (Textura de fundo)
                g.clear();
                g.fillStyle(CORES.agua, 1);
                g.fillRect(0, 0, 800, 600);
                g.fillStyle(CORES.aguaEscura, 0.3);
                g.fillRoundedRect(100, 50, 40, 10, 5);
                g.fillRoundedRect(300, 150, 60, 10, 5);
                g.fillRoundedRect(600, 100, 30, 10, 5);
                g.fillRoundedRect(500, 300, 70, 10, 5);
                g.generateTexture('rio', 800, 600);

                // 4. Indicador de alvo (Tracejado)
                g.clear();
                g.lineStyle(4, 0xFFFFFF, 0.8);
                g.strokeRoundedRect(0, 0, 170, 110, 16);
                g.generateTexture('alvo', 170, 110);
            }
        }

        // ==========================================
        // CENA 2: JOGO PRINCIPAL
        // ==========================================
        class GameScene extends Phaser.Scene {
            constructor() { super('GameScene'); }

            init() {
                this.perguntaAtual = 0;
                this.acertos = 0;
                this.estado = 'CRIANDO'; // CRIANDO, JOGANDO, ANIMANDO, GAMEOVER
                this.direcaoJangada = 1; // 1 = Direita, -1 = Esquerda
                this.velocidadeBase = 3; // Velocidade do movimento
                this.jangadasOpcoes = []; // Array para as 4 jangadas
            }

            create() {
                // 1. Fundo (Rio em movimento)
                this.fundoRio = this.add.tileSprite(400, 300, 800, 600, 'rio');

                // 2. Cachoeira (Barra indicadora de tempo no fundo)
                this.cachoeira = this.add.graphics();
                this.desenharCachoeira(650);

                // 3. Jangada Inicial (Onde o sapo começa)
                this.jangadaInicial = this.add.sprite(400, 450, 'jangada').setDepth(10);

                // 4. Sapo
                this.sapo = this.add.sprite(400, 440, 'sapo').setDepth(20);

                // 5. Alvo (indica para onde o sapo vai pular)
                this.alvo = this.add.sprite(400, 220, 'alvo').setDepth(15);
                this.alvo.setAlpha(0); // Escondido no início

                // 6. HUD (Interface)
                this.criarHUD();

                // 7. Controles
                this.cursores = this.input.keyboard.createCursorKeys();
                this.teclaEspaco = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

                // Iniciar a primeira pergunta
                this.novaPergunta();
            }

            desenharCachoeira(y) {
                this.cachoeira.clear();
                this.cachoeira.fillStyle(CORES.cachoeira, 0.9);
                this.cachoeira.fillRect(0, y, 800, 600); // Cobre a parte inferior
                // Efeito de espuma
                this.cachoeira.fillStyle(0xDDDDDD, 1);
                for(let i = 0; i < 800; i += 40) {
                    this.cachoeira.fillCircle(i + 20, y, 25);
                }
                this.cachoeiraY = y;
            }

            criarHUD() {
                // Fundo da pergunta
                let hudBg = this.add.graphics().setDepth(100);
                hudBg.fillStyle(0xFFFFFF, 1);
                hudBg.fillRoundedRect(50, 20, 700, 80, 20);
                hudBg.fillStyle(0xE5E5E5, 1);
                hudBg.fillRoundedRect(50, 90, 700, 10, {tl: 0, tr: 0, bl: 20, br: 20}); // Sombra do botão estilo Duolingo

                // Texto da pergunta
                this.textoPergunta = this.add.text(400, 60, '', {
                    fontFamily: 'Arial, sans-serif',
                    fontSize: '28px',
                    fontWeight: 'bold',
                    color: CORES.textoBase
                }).setOrigin(0.5).setDepth(101);

                // Contador de progresso
                this.textoProgresso = this.add.text(400, 15, 'Pergunta 1/5', {
                    fontFamily: 'Arial, sans-serif',
                    fontSize: '16px',
                    fontWeight: 'bold',
                    color: CORES.sapo
                }).setOrigin(0.5).setDepth(101);
            }

            novaPergunta() {
                if (this.perguntaAtual >= 5) {
                    this.scene.start('ResultScene', { acertos: this.acertos });
                    return;
                }

                this.estado = 'CRIANDO';
                let dados = perguntas[this.perguntaAtual];
                
                // Atualizar HUD
                this.textoPergunta.setText(dados.texto);
                this.textoProgresso.setText(`Pergunta ${this.perguntaAtual + 1}/5`);

                // Resetar cachoeira
                this.desenharCachoeira(650);

                // Criar/Reutilizar as 4 jangadas de opções
                for (let i = 0; i < 4; i++) {
                    // Container para juntar a imagem da jangada e o texto
                    let container = this.add.container(POSICOES_X[i], -100);
                    
                    let sprite = this.add.sprite(0, 0, 'jangada');
                    let texto = this.add.text(0, -5, dados.opcoes[i], {
                        fontFamily: 'Arial, sans-serif',
                        fontSize: '22px',
                        fontWeight: 'bold',
                        color: CORES.textoBranco,
                        stroke: '#000000',
                        strokeThickness: 3
                    }).setOrigin(0.5);

                    container.add([sprite, texto]);
                    container.isCorrect = (i === dados.correta);
                    this.jangadasOpcoes.push(container);

                    // Animação de descida
                    this.tweens.add({
                        targets: container,
                        y: 220,
                        duration: 1000,
                        ease: 'Back.easeOut',
                        onComplete: () => {
                            if(i === 3) {
                                this.estado = 'JOGANDO';
                                this.alvo.setAlpha(1);
                            }
                        }
                    });
                }
            }

            pular() {
                this.estado = 'ANIMANDO';
                this.alvo.setAlpha(0);

                let destinoX = this.sapo.x;

                // Animação do pulo do sapo
                this.tweens.add({
                    targets: this.sapo,
                    x: destinoX,
                    y: 210, // Altura das jangadas de destino
                    duration: 400,
                    ease: 'Quad.easeOut'
                });

                // Efeito de escala para simular altura do pulo
                this.tweens.add({
                    targets: this.sapo,
                    scaleX: 1.3,
                    scaleY: 1.3,
                    yoyo: true,
                    duration: 200,
                    ease: 'Sine.easeInOut',
                    onComplete: () => {
                        this.verificarResposta(destinoX);
                    }
                });
            }

            verificarResposta(frogX) {
                let margemErro = 75; // Tolerância para acertar a jangada (metade da largura aprox)
                let jangadaAlvo = this.jangadasOpcoes.find(j => Math.abs(j.x - frogX) <= margemErro);

                if (jangadaAlvo && jangadaAlvo.isCorrect) {
                    // ACERTO
                    this.acertos++;
                    
                    // Efeito visual de acerto
                    this.cameras.main.flash(300, 88, 204, 2); // Flash verde

                    // Destruir jangada inicial antiga e outras opções
                    this.jangadaInicial.destroy();
                    this.jangadaInicial = this.add.sprite(jangadaAlvo.x, jangadaAlvo.y, 'jangada').setDepth(10);
                    this.sapo.setX(jangadaAlvo.x); // Alinha sapo perfeitamente no centro da jangada
                    this.sapo.setY(jangadaAlvo.y - 10);
                    
                    this.jangadasOpcoes.forEach(j => j.destroy());
                    this.jangadasOpcoes = [];

                    // Aumentar levemente a velocidade para ficar mais desafiador
                    this.velocidadeBase += 0.5;

                    // Descer tudo para preparar próxima pergunta
                    this.tweens.add({
                        targets: [this.jangadaInicial, this.sapo],
                        y: '+=230', // Move de volta para Y=450
                        duration: 800,
                        ease: 'Cubic.easeInOut',
                        onComplete: () => {
                            this.perguntaAtual++;
                            this.novaPergunta();
                        }
                    });

                } else if (jangadaAlvo && !jangadaAlvo.isCorrect) {
                    // ERRO - Caiu na jangada errada
                    this.cameras.main.shake(300, 0.02); // Treme a tela
                    
                    // Afundar jangada e sapo
                    this.tweens.add({
                        targets: [jangadaAlvo, this.sapo],
                        scaleX: 0,
                        scaleY: 0,
                        alpha: 0,
                        angle: 180,
                        duration: 800,
                        ease: 'Cubic.easeIn',
                        onComplete: () => {
                            this.scene.start('ResultScene', { acertos: this.acertos });
                        }
                    });
                } else {
                    // ERRO - Errou todas as jangadas (caiu na água)
                    this.cameras.main.shake(300, 0.02);
                    this.tweens.add({
                        targets: this.sapo,
                        scaleX: 0,
                        scaleY: 0,
                        alpha: 0,
                        angle: 180,
                        y: '+=50', // Afunda na água
                        duration: 800,
                        ease: 'Cubic.easeIn',
                        onComplete: () => {
                            this.scene.start('ResultScene', { acertos: this.acertos });
                        }
                    });
                }
            }

            update(time, delta) {
                // 1. Mover fundo (efeito de correnteza)
                this.fundoRio.tilePositionY -= 1.5;

                // 2. Lógica de Input (Apenas no estado JOGANDO)
                if (this.estado === 'JOGANDO') {
                    // Movimentação automática lateral (vai e volta)
                    this.jangadaInicial.x += this.velocidadeBase * this.direcaoJangada;
                    this.sapo.x = this.jangadaInicial.x;
                    this.alvo.x = this.jangadaInicial.x;

                    // Inverter direção nas bordas (700 é a direita, 100 é a esquerda)
                    if (this.jangadaInicial.x >= 700) {
                        this.direcaoJangada = -1;
                    } else if (this.jangadaInicial.x <= 100) {
                        this.direcaoJangada = 1;
                    }

                    // Pulo Frontal (Confirma a escolha no tempo certo)
                    if (Phaser.Input.Keyboard.JustDown(this.cursores.up) || Phaser.Input.Keyboard.JustDown(this.teclaEspaco)) {
                        this.pular();
                    }

                    // 3. Mecânica de Tempo ("Se demorar: cai na cachoeira")
                    // A cachoeira sobe lentamente
                    this.desenharCachoeira(this.cachoeiraY - 0.5);

                    // Se a cachoeira atingir a jangada inicial do sapo (Y = 450)
                    if (this.cachoeiraY <= 480) {
                        this.estado = 'GAMEOVER';
                        this.alvo.setAlpha(0);
                        
                        // Sapo e jangada caem na cachoeira
                        this.tweens.add({
                            targets: [this.jangadaInicial, this.sapo],
                            y: '+=200',
                            alpha: 0,
                            rotation: 2,
                            duration: 1000,
                            ease: 'Cubic.easeIn',
                            onComplete: () => {
                                this.scene.start('ResultScene', { acertos: this.acertos });
                            }
                        });
                    }
                }
            }
        }

        // ==========================================
        // CENA 3: RESULTADO (Fim de jogo)
        // ==========================================
        class ResultScene extends Phaser.Scene {
            constructor() { super('ResultScene'); }

            init(data) {
                this.acertos = data.acertos || 0;
            }

            create() {
                // Fundo desfocado/translúcido
                this.add.rectangle(400, 300, 800, 600, CORES.agua, 0.9);

                // Painel Central
                let painel = this.add.graphics();
                painel.fillStyle(0xFFFFFF, 1);
                painel.fillRoundedRect(200, 150, 400, 300, 30);
                painel.fillStyle(0xE5E5E5, 1);
                painel.fillRoundedRect(200, 430, 400, 20, {tl: 0, tr: 0, bl: 30, br: 30});

                // Título
                let mensagem = this.acertos === 5 ? "Perfeito! 🌟" : "Game Over! 💦";
                let corMensagem = this.acertos === 5 ? CORES.acerto : CORES.erro;

                this.add.text(400, 220, mensagem, {
                    fontFamily: 'Arial, sans-serif',
                    fontSize: '36px',
                    fontWeight: 'bold',
                    color: corMensagem
                }).setOrigin(0.5);

                // Pontuação
                this.add.text(400, 280, `${this.acertos} / 5 acertos`, {
                    fontFamily: 'Arial, sans-serif',
                    fontSize: '28px',
                    fontWeight: 'bold',
                    color: CORES.textoBase
                }).setOrigin(0.5);

                // Botão de Reiniciar
                let btnX = 400;
                let btnY = 370;
                
                let btnGrafico = this.add.graphics();
                btnGrafico.fillStyle(CORES.sapoSombra, 1); // Sombra do botão
                btnGrafico.fillRoundedRect(btnX - 100, btnY - 20, 200, 60, 20);
                btnGrafico.fillStyle(CORES.sapo, 1); // Face do botão
                btnGrafico.fillRoundedRect(btnX - 100, btnY - 25, 200, 60, 20);

                let btnTexto = this.add.text(btnX, btnY + 5, 'JOGAR NOVAMENTE', {
                    fontFamily: 'Arial, sans-serif',
                    fontSize: '16px',
                    fontWeight: 'bold',
                    color: '#FFFFFF'
                }).setOrigin(0.5);

                // Interatividade do botão
                let btnArea = this.add.zone(btnX, btnY, 200, 60).setOrigin(0.5).setInteractive({ cursor: 'pointer' });
                
                btnArea.on('pointerdown', () => {
                    // Efeito de clique (afunda o botão)
                    btnGrafico.clear();
                    btnGrafico.fillStyle(CORES.sapoSombra, 1);
                    btnGrafico.fillRoundedRect(btnX - 100, btnY - 20, 200, 60, 20);
                    btnTexto.setY(btnY + 10);
                });

                btnArea.on('pointerup', () => {
                    // Reinício instantâneo
                    this.scene.start('GameScene');
                });
            }
        }

        // ==========================================
        // INICIALIZAÇÃO DO PHASER
        // ==========================================
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            transparent: true,
            physics: { default: 'none' }, // Física complexa não é necessária, tweens cuidam do movimento fluido
            scene: [BootScene, GameScene, ResultScene]
        };

        const game = new Phaser.Game(config);

    </script>
</body>
</html>
