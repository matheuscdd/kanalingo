<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM Style Audio Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles/player.css" />
    <script defer src="./scripts/player.js" type="module"></script>
    <link
            href="/src/assets/images/icon-filled.png"
            rel="shortcut icon"
            type="image/x-icon"
        />
</head>
<body>

    <div class="player-card">
        <!-- Cabeçalho do Episódio -->
        <div class="episode-meta" id="episode-meta">
            <div class="episode-meta-topline">
                <span class="episode-podcast" id="podcast-title">Podcast</span>
                <span class="player-status" id="player-status">A carregar episódio...</span>
            </div>
            <p class="episode-section" id="section-title">Secção</p>
            <h1 class="episode-title" id="episode-title">Selecione um episódio na biblioteca</h1>
        </div>

        <!-- Animação do Áudio -->
        <div class="canvas-container">
            <canvas id="waveform"></canvas>
        </div>

        <!-- Controles Secundários -->
        <div class="secondary-controls">
            <button class="sec-btn" id="speed-btn" title="Velocidade">1X</button>
            <button class="sec-btn" id="subtitle-btn" title="Legendas"><i class="fa-regular fa-closed-captioning"></i></button>
            <button class="sec-btn" id="download-btn" title="Download" disabled><i class="fa-solid fa-download"></i></button>
        </div>

        <!-- Área de Legendas -->
        <div class="subtitle-wrapper" id="subtitle-wrapper">
            <div class="subtitle-text" id="subtitle-text"></div>
        </div>

        <!-- Progresso -->
        <div class="progress-wrapper">
            <span class="time" id="current-time">0:00</span>
            <div class="progress-container">
                <input type="range" id="progress-bar" value="0" min="0" max="100" step="0.1">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span class="time" id="duration">0:00</span>
        </div>

        <!-- Controles Principais -->
        <div class="main-controls">
            <button class="skip-btn" id="skip-back">
                <i class="fa-solid fa-rotate-left"></i>
                <span class="skip-text">10</span>
            </button>
            
            <button class="play-btn" id="play-pause-btn" disabled>
                <i class="fa-solid fa-play"></i>
            </button>
            
            <button class="skip-btn" id="skip-forward">
                <i class="fa-solid fa-rotate-right"></i>
                <span class="skip-text">10</span>
            </button>
        </div>

    </div>


</body>
</html>
