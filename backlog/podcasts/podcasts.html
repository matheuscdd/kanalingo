<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seletor de Podcasts - Estilo Duolingo</title>
    <!-- FontAwesome para os ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Variáveis de Cores - Paleta inspirada no Duolingo */
        :root {
            --bg-color: #ffffff;
            --app-bg: #f7f7f7;
            --text-main: #4b4b4b;
            --text-light: #777777;
            --border-color: #e5e5e5;
            
            --primary: #58cc02; /* Verde */
            --primary-shadow: #58a700;
            
            --secondary: #1cb0f6; /* Azul */
            --secondary-shadow: #1899d6;
            
            --accent: #ff9600; /* Laranja */
            --danger: #ff4b4b; /* Vermelho */
            
            --card-radius: 16px;
            --input-radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--app-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Contentor Principal da Aplicação */
        #app-container {
            width: 100%;
            max-width: 800px;
            background-color: var(--bg-color);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Seletor de Idioma --- */
        .global-top-bar {
            display: flex;
            justify-content: flex-end;
            padding: 15px 20px 0 20px;
            z-index: 10;
        }

        .lang-selector {
            position: relative;
        }

        .lang-btn {
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-bottom: 4px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-main);
            transition: all 0.1s;
            font-size: 0.9rem;
        }

        .lang-btn:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
        }

        .lang-flag {
            width: 24px;
            height: 18px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        .lang-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            display: none;
            flex-direction: column;
            min-width: 100px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 20;
        }

        .lang-dropdown.show {
            display: flex;
        }

        .lang-option {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-main);
            transition: background-color 0.1s;
        }

        .lang-option:hover {
            background-color: var(--app-bg);
        }

        /* Gestão de Vistas */
        .view {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cabeçalhos */
        header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--text-main);
            flex-grow: 1;
        }

        .header-thumb {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid var(--border-color);
        }

        /* Botões de Navegação (Voltar) */
        .btn-icon {
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-bottom: 4px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-light);
            font-size: 1.1rem;
            transition: all 0.1s;
        }

        .btn-icon:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
        }

        /* Barra de Pesquisa */
        .search-container {
            position: relative;
            margin-bottom: 25px;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .search-input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid var(--border-color);
            border-radius: var(--input-radius);
            font-size: 1rem;
            color: var(--text-main);
            background-color: var(--app-bg);
            transition: border-color 0.2s;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--secondary);
            background-color: var(--bg-color);
        }

        /* Controlos (Pesquisa e Vistas) */
        .controls-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            align-items: center;
        }

        .controls-container .search-container {
            flex-grow: 1;
            margin-bottom: 0;
        }

        .view-controls {
            display: flex;
            gap: 8px;
        }

        .view-btn {
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-bottom: 4px solid var(--border-color);
            border-radius: 12px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-light);
            font-size: 1.2rem;
            transition: all 0.1s;
        }

        .view-btn.active {
            color: var(--secondary);
            border-color: var(--secondary);
            border-bottom-color: var(--secondary-shadow);
        }

        .view-btn:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
        }

        /* Grelhas (Grids) para Cards */
        .grid-container {
            display: grid;
            gap: 15px;
        }

        .grid-podcasts {
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        }

        .grid-sections {
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        }

        /* Cartões Estilo Duolingo (Cards) */
        .card {
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-bottom: 6px solid var(--border-color);
            border-radius: var(--card-radius);
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            text-align: center;
        }

        .card:hover {
            background-color: #fcfcfc;
        }

        .card:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
            margin-bottom: 4px;
        }

        .card-image-placeholder {
            height: 160px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: white;
            background: linear-gradient(135deg, var(--secondary), var(--secondary-shadow));
        }

        .card-section .card-image-placeholder {
            height: 110px;
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent), #e58700);
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 15px 10px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .card-subtitle {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        /* --- Modificadores para Modo de Lista --- */
        .grid-container.list-mode {
            grid-template-columns: 1fr !important;
        }

        .list-mode .card {
            flex-direction: row;
            align-items: center;
            text-align: left;
        }

        /* Por padrão, oculta a imagem no modo lista (Mantém design limpo para itens sem imagem) */
        .list-mode .card-image-placeholder {
            display: none !important; 
        }

        /* MAS, se o item tiver uma imagem (classe .has-image), mostra uma miniatura elegante */
        .list-mode .card.has-image .card-image-placeholder {
            display: flex !important;
            width: 70px !important;
            height: 70px !important;
            min-width: 70px;
            margin: 12px 0 12px 12px; /* Margem apenas à volta da imagem */
            border-radius: 10px;
            background: transparent !important; /* Remove fundo para imagens transparentes */
            overflow: hidden;
        }

        .list-mode .card.has-image .card-img {
            border-radius: 10px;
        }

        .list-mode .card-content {
            padding: 15px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Reduz o padding esquerdo do texto se houver imagem ao lado */
        .list-mode .card.has-image .card-content {
            padding-left: 15px; 
        }
        /* --- Fim Modificadores Modo Lista --- */

        /* Grelha Dinâmica de Episódios */
        .grid-episodes {
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        }

        .episode-item {
            display: flex;
            flex-direction: column; /* Modo Grid por defeito */
            align-items: center;
            text-align: center;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-bottom: 4px solid var(--border-color);
            border-radius: var(--card-radius);
            background-color: var(--bg-color);
            cursor: pointer;
            transition: all 0.1s;
            gap: 12px;
        }

        .episode-item:active {
            border-bottom-width: 2px;
            transform: translateY(2px);
            margin-bottom: 2px;
        }

        .episode-play-btn {
            color: var(--primary);
            font-size: 3rem; /* Ícone maior no modo Card */
            order: 0;
        }

        /* Nova classe para a miniatura do episódio */
        .episode-thumb {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background-color: var(--app-bg);
            border: 1px solid var(--border-color);
            order: -1; /* Força a imagem a ir para o topo no modo Card */
        }

        .episode-info {
            flex-grow: 1;
            width: 100%;
            order: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .episode-title {
            font-weight: bold;
            color: var(--text-main);
        }

        .episode-duration {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        /* --- Modificadores para Modo Lista (Episódios) --- */
        .list-mode .episode-item {
            flex-direction: row; /* Volta a alinhar na horizontal */
            text-align: left;
            gap: 15px;
        }

        .list-mode .episode-thumb {
            width: 45px;
            height: 45px;
            order: 0; /* Volta à posição natural (meio) */
        }

        .list-mode .episode-play-btn {
            font-size: 1.8rem; /* Reduz o botão Play */
        }

        .list-mode .episode-info {
            width: auto;
        }
        /* --- Fim Modificadores Lista Episódios --- */

        /* Mensagem de Estado Vazio */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--border-color);
        }

        /* --- Media Queries para Responsividade --- */
        @media (max-width: 600px) {
            .grid-podcasts {
                grid-template-columns: 1fr; 
            }
            .grid-sections, .grid-episodes {
                grid-template-columns: repeat(2, 1fr); 
            }
            .card-image-placeholder {
                height: 180px; 
            }
            .card-section .card-image-placeholder {
                height: 100px; 
            }
            .episode-thumb {
                height: 90px;
            }
            header h1 {
                font-size: 1.2rem;
            }
        }

    </style>
</head>
<body>

    <div id="app-container">
        
        <!-- Barra Global com Seletor de Idioma -->
        <div class="global-top-bar">
            <div class="lang-selector">
                <button id="lang-btn" class="lang-btn" onclick="toggleLangDropdown()">
                    <img src="https://flagcdn.com/w40/pt.png" alt="PT" class="lang-flag" id="current-lang-flag">
                    <span id="current-lang-text">PT</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="lang-dropdown" id="lang-dropdown">
                    <div class="lang-option" onclick="setLanguage('pt')">
                        <img src="https://flagcdn.com/w40/pt.png" alt="PT" class="lang-flag"> PT
                    </div>
                    <div class="lang-option" onclick="setLanguage('en')">
                        <img src="https://flagcdn.com/w40/gb.png" alt="EN" class="lang-flag"> EN
                    </div>
                    <div class="lang-option" onclick="setLanguage('es')">
                        <img src="https://flagcdn.com/w40/es.png" alt="ES" class="lang-flag"> ES
                    </div>
                </div>
            </div>
        </div>

        <!-- VISTA 1: Lista de Podcasts -->
        <div id="view-podcasts" class="view active">
            <header>
                <h1 id="title-podcasts">O que queres ouvir?</h1>
            </header>
            <div class="controls-container">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-podcasts" class="search-input" placeholder="Pesquisar podcasts...">
                </div>
                <div class="view-controls">
                    <button class="view-btn active" data-view="grid" onclick="setViewMode('podcasts', 'grid')"><i class="fas fa-th-large"></i></button>
                    <button class="view-btn" data-view="list" onclick="setViewMode('podcasts', 'list')"><i class="fas fa-list"></i></button>
                </div>
            </div>
            <div id="podcasts-grid" class="grid-container grid-podcasts">
                <!-- Cards injetados via JS -->
            </div>
        </div>

        <!-- VISTA 2: Lista de Secções dentro de um Podcast -->
        <div id="view-sections" class="view">
            <header>
                <button class="btn-icon" onclick="navigate('podcasts')"><i class="fas fa-arrow-left"></i></button>
                <img id="header-podcast-img" class="header-thumb" src="" alt="Capa" style="display: none;">
                <h1 id="header-podcast-title">Título do Podcast</h1>
            </header>
            <div class="controls-container">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-sections" class="search-input" placeholder="Pesquisar secções (ex: Temporadas)...">
                </div>
                <div class="view-controls">
                    <button class="view-btn active" data-view="grid" onclick="setViewMode('sections', 'grid')"><i class="fas fa-th-large"></i></button>
                    <button class="view-btn" data-view="list" onclick="setViewMode('sections', 'list')"><i class="fas fa-list"></i></button>
                </div>
            </div>
            <div id="sections-grid" class="grid-container grid-sections">
                <!-- Cards injetados via JS -->
            </div>
        </div>

        <!-- VISTA 3: Lista de Episódios dentro de uma Secção -->
        <div id="view-episodes" class="view">
            <header>
                <button class="btn-icon" onclick="navigate('sections')"><i class="fas fa-arrow-left"></i></button>
                <img id="header-section-img" class="header-thumb" src="" alt="Capa" style="display: none;">
                <h1 id="header-section-title">Título da Secção</h1>
            </header>
            <div class="controls-container">
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-episodes" class="search-input" placeholder="Pesquisar episódios...">
                </div>
                <div class="view-controls">
                    <button class="view-btn" data-view="grid" onclick="setViewMode('episodes', 'grid')"><i class="fas fa-th-large"></i></button>
                    <button class="view-btn active" data-view="list" onclick="setViewMode('episodes', 'list')"><i class="fas fa-list"></i></button>
                </div>
            </div>
            <div id="episodes-grid" class="grid-container grid-episodes list-mode">
                <!-- Itens da lista injetados via JS -->
            </div>
        </div>

    </div>

    <script>
        // --- 1. Dados Simulados (Mock Data) ---
        const mockData = [
            {
                id: 'p1',
                title: 'Tech PT',
                author: 'Comunidade DEV',
                icon: 'fa-laptop-code',
                color: '#1cb0f6',
                imageUrl: 'https://picsum.photos/seed/tech/400/400',
                sections: [
                    {
                        id: 's1-1', title: 'Temporada 1: Iniciação', icon: 'fa-seedling', color: '#58cc02',
                        imageUrl: 'https://picsum.photos/seed/temp1/400/400',
                        episodes: [
                            { id: 'e1', title: 'O que é o Vanilla JS?', duration: '45:12', imageUrl: 'https://picsum.photos/seed/ep1/100/100' },
                            { id: 'e2', title: 'HTML Semântico hoje', duration: '32:05' },
                            { id: 'e3', title: 'CSS Grid vs Flexbox', duration: '50:40', imageUrl: 'https://picsum.photos/seed/ep3/100/100' }
                        ]
                    },
                    {
                        id: 's1-2', title: 'Temporada 2: Avançado', icon: 'fa-rocket', color: '#ff9600',
                        imageUrl: 'https://picsum.photos/seed/temp2/400/400',
                        episodes: [
                            { id: 'e4', title: 'Arquitetura de SPA', duration: '55:00' },
                            { id: 'e5', title: 'Web Components', duration: '40:20' }
                        ]
                    }
                ]
            },
            {
                id: 'p2',
                title: 'Design Diário',
                author: 'Maria Designer',
                icon: 'fa-pen-nib',
                color: '#ce82ff',
                imageUrl: 'https://picsum.photos/seed/design/400/400',
                sections: [
                    {
                        id: 's2-1', title: 'UI/UX Fundamentals', icon: 'fa-layer-group', color: '#ff4b4b',
                        imageUrl: 'https://picsum.photos/seed/uiux/400/400',
                        episodes: [
                            { id: 'e6', title: 'Flat Design em 2024', duration: '30:00', imageUrl: 'https://picsum.photos/seed/ep6/100/100' },
                            { id: 'e7', title: 'Acessibilidade (a11y)', duration: '42:15' }
                        ]
                    },
                    {
                        id: 's2-2', title: 'Ferramentas', icon: 'fa-wrench', color: '#2b70c9',
                        imageUrl: '', // Exemplo deixado vazio propositadamente
                        episodes: [
                            { id: 'e8', title: 'Figma Truques e Dicas', duration: '28:50' }
                        ]
                    }
                ]
            },
            {
                id: 'p3',
                title: 'Startup Vida',
                author: 'João Empreendedor',
                icon: 'fa-chart-line',
                color: '#58cc02',
                imageUrl: '', // Exemplo sem imagem para veres o comportamento de "fallback" (texto apenas) em lista
                sections: [
                    {
                        id: 's3-1', title: 'Entrevistas', icon: 'fa-microphone-lines', color: '#1cb0f6',
                        imageUrl: 'https://picsum.photos/seed/startup/400/400',
                        episodes: [
                            { id: 'e9', title: 'Como validar uma ideia', duration: '60:00' },
                            { id: 'e10', title: 'Angariar investimento', duration: '45:30' }
                        ]
                    }
                ]
            }
        ];

        // --- 2. Estado da Aplicação e Traduções ---
        const translations = {
            pt: {
                titlePodcasts: "O que queres ouvir?",
                searchPodcasts: "Pesquisar podcasts...",
                searchSections: "Pesquisar secções (ex: Temporadas)...",
                searchEpisodes: "Pesquisar episódios...",
                emptyPodcasts: "Nenhum podcast encontrado.",
                emptySections: "Nenhuma secção encontrada.",
                emptyEpisodes: "Nenhum episódio encontrado.",
                episodesCount: "episódios",
                playing: "A reproduzir:",
                flagUrl: "https://flagcdn.com/w40/pt.png"
            },
            en: {
                titlePodcasts: "What do you want to hear?",
                searchPodcasts: "Search podcasts...",
                searchSections: "Search sections (e.g., Seasons)...",
                searchEpisodes: "Search episodes...",
                emptyPodcasts: "No podcasts found.",
                emptySections: "No sections found.",
                emptyEpisodes: "No episodes found.",
                episodesCount: "episodes",
                playing: "Playing:",
                flagUrl: "https://flagcdn.com/w40/gb.png"
            },
            es: {
                titlePodcasts: "¿Qué quieres escuchar?",
                searchPodcasts: "Buscar podcasts...",
                searchSections: "Buscar secciones (ej: Temporadas)...",
                searchEpisodes: "Buscar episodios...",
                emptyPodcasts: "No se encontraron podcasts.",
                emptySections: "No se encontraron secciones.",
                emptyEpisodes: "No se encontraron episodios.",
                episodesCount: "episodios",
                playing: "Reproduciendo:",
                flagUrl: "https://flagcdn.com/w40/es.png"
            }
        };

        let state = {
            currentPodcastId: null,
            currentSectionId: null,
            lang: localStorage.getItem('duolingo_lang') || 'pt',
            viewModes: {
                podcasts: localStorage.getItem('duolingo_podcasts_view') || 'grid',
                sections: localStorage.getItem('duolingo_sections_view') || 'grid',
                episodes: localStorage.getItem('duolingo_episodes_view') || 'list' // Por defeito, episódios começam em lista
            }
        };

        // --- 3. Elementos do DOM ---
        const views = {
            podcasts: document.getElementById('view-podcasts'),
            sections: document.getElementById('view-sections'),
            episodes: document.getElementById('view-episodes')
        };

        const containers = {
            podcasts: document.getElementById('podcasts-grid'),
            sections: document.getElementById('sections-grid'),
            episodes: document.getElementById('episodes-grid')
        };

        const inputs = {
            podcasts: document.getElementById('search-podcasts'),
            sections: document.getElementById('search-sections'),
            episodes: document.getElementById('search-episodes')
        };

        // --- 4. Funções de Idioma ---
        function toggleLangDropdown() {
            document.getElementById('lang-dropdown').classList.toggle('show');
        }

        function setLanguage(langCode) {
            state.lang = langCode;
            localStorage.setItem('duolingo_lang', langCode);
            
            // Atualizar UI do botão
            document.getElementById('current-lang-text').textContent = langCode.toUpperCase();
            document.getElementById('current-lang-flag').src = translations[langCode].flagUrl;
            
            // Fechar dropdown
            document.getElementById('lang-dropdown').classList.remove('show');
            
            // Atualizar textos estáticos
            applyTranslations();
            
            // Re-renderizar a vista atual
            if (views.podcasts.classList.contains('active')) renderPodcasts(mockData);
            if (views.sections.classList.contains('active')) navigate('sections', state.currentPodcastId);
            if (views.episodes.classList.contains('active')) navigate('episodes', state.currentSectionId);
        }

        function applyTranslations() {
            const t = translations[state.lang];
            document.getElementById('title-podcasts').textContent = t.titlePodcasts;
            inputs.podcasts.placeholder = t.searchPodcasts;
            inputs.sections.placeholder = t.searchSections;
            inputs.episodes.placeholder = t.searchEpisodes;
        }

        // Fechar dropdown ao clicar fora
        document.addEventListener('click', (e) => {
            const selector = document.querySelector('.lang-selector');
            if (selector && !selector.contains(e.target)) {
                document.getElementById('lang-dropdown').classList.remove('show');
            }
        });

        // --- 5. Funções de Navegação e Visualização ---
        function setViewMode(viewName, mode) {
            state.viewModes[viewName] = mode;
            localStorage.setItem(`duolingo_${viewName}_view`, mode);
            updateViewModeUI(viewName);
        }

        function updateViewModeUI(viewName) {
            const mode = state.viewModes[viewName];
            const container = containers[viewName];
            
            if (!container) return;

            if (mode === 'list') {
                container.classList.add('list-mode');
            } else {
                container.classList.remove('list-mode');
            }

            const buttons = document.querySelectorAll(`#view-${viewName} .view-btn`);
            buttons.forEach(btn => {
                if (btn.dataset.view === mode) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function navigate(viewName, id = null) {
            Object.values(views).forEach(view => view.classList.remove('active'));
            Object.values(inputs).forEach(input => input.value = '');
            views[viewName].classList.add('active');

            if (viewName === 'podcasts') {
                state.currentPodcastId = null;
                state.currentSectionId = null;
                renderPodcasts(mockData);
            } 
            else if (viewName === 'sections') {
                if (id) state.currentPodcastId = id;
                const podcast = mockData.find(p => p.id === state.currentPodcastId);
                document.getElementById('header-podcast-title').textContent = podcast.title;
                
                // Tratar a imagem no cabeçalho
                const headerImg = document.getElementById('header-podcast-img');
                if (podcast.imageUrl) {
                    headerImg.src = podcast.imageUrl;
                    headerImg.style.display = 'block';
                } else {
                    headerImg.style.display = 'none';
                }

                renderSections(podcast.sections);
            } 
            else if (viewName === 'episodes') {
                if (id) state.currentSectionId = id;
                const podcast = mockData.find(p => p.id === state.currentPodcastId);
                const section = podcast.sections.find(s => s.id === state.currentSectionId);
                document.getElementById('header-section-title').textContent = section.title;

                // Tratar a imagem no cabeçalho
                const headerImg = document.getElementById('header-section-img');
                if (section.imageUrl) {
                    headerImg.src = section.imageUrl;
                    headerImg.style.display = 'block';
                } else {
                    headerImg.style.display = 'none';
                }

                renderEpisodes(section.episodes);
            }
        }

        // --- 5. Funções de Renderização ---
        function renderEmptyState(container, message) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-ghost"></i>
                    <p>${message}</p>
                </div>
            `;
        }

        function renderPodcasts(data) {
            containers.podcasts.innerHTML = '';
            if (data.length === 0) return renderEmptyState(containers.podcasts, translations[state.lang].emptyPodcasts);

            data.forEach(podcast => {
                const card = document.createElement('div');
                // Adiciona a classe 'has-image' para ativar a miniatura na vista de lista, se existir imagem
                const hasImageClass = podcast.imageUrl ? 'has-image' : 'no-image';
                card.className = `card ${hasImageClass}`;
                card.onclick = () => navigate('sections', podcast.id);
                
                const backgroundStyle = podcast.imageUrl 
                    ? `background: var(--border-color);` 
                    : `background: linear-gradient(135deg, ${podcast.color}, ${podcast.color}cc);`;
                    
                const imageContent = podcast.imageUrl 
                    ? `<img src="${podcast.imageUrl}" alt="${podcast.title}" class="card-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                       <i class="fas ${podcast.icon}" style="display: none;"></i>` 
                    : `<i class="fas ${podcast.icon}"></i>`;

                card.innerHTML = `
                    <div class="card-image-placeholder" style="${backgroundStyle}">
                        ${imageContent}
                    </div>
                    <div class="card-content">
                        <div class="card-title">${podcast.title}</div>
                        <div class="card-subtitle">${podcast.author}</div>
                    </div>
                `;
                containers.podcasts.appendChild(card);
            });
        }

        function renderSections(data) {
            containers.sections.innerHTML = '';
            if (data.length === 0) return renderEmptyState(containers.sections, translations[state.lang].emptySections);

            data.forEach(section => {
                const card = document.createElement('div');
                const hasImageClass = section.imageUrl ? 'has-image' : 'no-image';
                card.className = `card card-section ${hasImageClass}`;
                card.onclick = () => navigate('episodes', section.id);
                
                const backgroundStyle = section.imageUrl 
                    ? `background: var(--border-color);` 
                    : `background: linear-gradient(135deg, ${section.color}, ${section.color}cc);`;
                    
                const imageContent = section.imageUrl 
                    ? `<img src="${section.imageUrl}" alt="${section.title}" class="card-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                       <i class="fas ${section.icon}" style="display: none;"></i>` 
                    : `<i class="fas ${section.icon}"></i>`;

                card.innerHTML = `
                    <div class="card-image-placeholder" style="${backgroundStyle}">
                        ${imageContent}
                    </div>
                    <div class="card-content">
                        <div class="card-title">${section.title}</div>
                        <div class="card-subtitle">${section.episodes.length} ${translations[state.lang].episodesCount}</div>
                    </div>
                `;
                containers.sections.appendChild(card);
            });
        }

        function renderEpisodes(data) {
            containers.episodes.innerHTML = '';
            if (data.length === 0) return renderEmptyState(containers.episodes, translations[state.lang].emptyEpisodes);

            data.forEach(episode => {
                const item = document.createElement('div'); // Mudou de <li> para <div> para fazer parte do Grid
                item.className = 'episode-item';
                item.onclick = () => alert(`${translations[state.lang].playing} ${episode.title}`);
                
                const thumbHtml = episode.imageUrl 
                    ? `<img src="${episode.imageUrl}" class="episode-thumb" alt="Capa" onerror="this.style.display='none';">` 
                    : '';

                item.innerHTML = `
                    <div class="episode-play-btn"><i class="fas fa-circle-play"></i></div>
                    ${thumbHtml}
                    <div class="episode-info">
                        <div class="episode-title">${episode.title}</div>
                        <div class="episode-duration"><i class="far fa-clock"></i> ${episode.duration}</div>
                    </div>
                `;
                containers.episodes.appendChild(item);
            });
        }

        // --- 6. Event Listeners para Pesquisa (Filtros) ---
        inputs.podcasts.addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const filtrados = mockData.filter(p => 
                p.title.toLowerCase().includes(termo) || 
                p.author.toLowerCase().includes(termo)
            );
            renderPodcasts(filtrados);
        });

        inputs.sections.addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const podcast = mockData.find(p => p.id === state.currentPodcastId);
            const filtrados = podcast.sections.filter(s => 
                s.title.toLowerCase().includes(termo)
            );
            renderSections(filtrados);
        });

        inputs.episodes.addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const podcast = mockData.find(p => p.id === state.currentPodcastId);
            const section = podcast.sections.find(s => s.id === state.currentSectionId);
            const filtrados = section.episodes.filter(ep => 
                ep.title.toLowerCase().includes(termo)
            );
            renderEpisodes(filtrados);
        });

        // --- 7. Inicialização ---
        applyTranslations(); // Aplica idioma guardado logo no início
        
        // Atualiza a UI do botão de idioma na inicialização
        document.getElementById('current-lang-text').textContent = state.lang.toUpperCase();
        document.getElementById('current-lang-flag').src = translations[state.lang].flagUrl;

        updateViewModeUI('podcasts');
        updateViewModeUI('sections');
        updateViewModeUI('episodes'); // Inicializa também a vista dos episódios
        renderPodcasts(mockData);

    </script>
</body>
</html>
