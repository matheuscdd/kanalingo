<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Voo do Saber - Bico para Direita</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --viewport-height: 100dvh;
            --safe-top: max(env(safe-area-inset-top, 0px), 12px);
            --safe-right: max(env(safe-area-inset-right, 0px), 12px);
            --safe-bottom: max(env(safe-area-inset-bottom, 0px), 12px);
            --safe-left: max(env(safe-area-inset-left, 0px), 12px);
            --hud-gap: clamp(10px, 2vw, 24px);
            --question-width: min(78vw, 520px);
            --control-size: 82px;
            --control-bottom-offset: calc(var(--safe-bottom) + 18px);
            --sky-top: #8fd8ff;
            --sky-bottom: #dff9ff;
            --surface: #ffffff;
            --surface-soft: #f4fcff;
            --surface-outline: #cae8f7;
            --surface-shadow: #afd9ee;
            --ink: #25495f;
            --accent: #58cc02;
            --accent-dark: #44a000;
            --accent-soft: #ddf6c0;
            --danger: #ff6b6b;
            --gold: #ffcf48;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; user-select: none; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: var(--sky-top);
            min-height: var(--viewport-height);
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100dvw;
            width: 100vw;
            height: var(--viewport-height);
            min-height: var(--viewport-height);
            background:
                radial-gradient(circle at 16% 18%, rgba(255, 255, 255, 0.42) 0 7%, transparent 7.4%),
                radial-gradient(circle at 82% 14%, rgba(255, 255, 255, 0.36) 0 6%, transparent 6.4%),
                linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
            overflow: hidden;
            border: 5px solid rgba(255, 255, 255, 0.9);
        }

        /* Feedback Visual */
        .flash-red { animation: flashRed 0.4s ease-in-out; }
        .flash-green { animation: flashGreen 0.4s ease-in-out; }
        @keyframes flashRed { 0%, 100% { background: inherit; } 50% { background: #ffd8d4; } }
        @keyframes flashGreen { 0%, 100% { background: inherit; } 50% { background: #e3f9c9; } }

        /* Interface (UI) */
        #ui-layer {
            position: absolute;
            top: var(--safe-top);
            left: var(--safe-left);
            right: var(--safe-right);
            display: flex;
            justify-content: space-between;
            gap: var(--hud-gap);
            z-index: 60;
            pointer-events: none;
        }

        .stats {
            background: var(--surface);
            color: var(--ink);
            padding: 10px 16px;
            border-radius: 18px;
            border: 3px solid var(--surface-outline);
            box-shadow: 0 5px 0 var(--surface-shadow);
            font-weight: 900;
            font-size: clamp(0.95rem, 1.8vw, 1.1rem);
        }

        #question-box {
            position: absolute;
            top: calc(var(--safe-top) + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            color: var(--ink);
            padding: 14px 28px;
            border-radius: 28px;
            box-shadow: 0 6px 0 var(--surface-shadow);
            font-weight: 900;
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            z-index: 55;
            text-align: center;
            border: 3px solid var(--surface-outline);
            width: var(--question-width);
            max-width: calc(100vw - (var(--safe-left) + var(--safe-right) + 16px));
            min-width: min(280px, calc(100vw - 32px));
        }

        /* Botões de Comando (Mobile/Touch) */
        #mobile-controls {
            position: absolute;
            bottom: var(--control-bottom-offset);
            left: 0;
            width: 100%;
            padding: 0 max(20px, var(--safe-right)) 0 max(20px, var(--safe-left));
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 70;
            pointer-events: none;
        }

        body.touch-layout #mobile-controls.active {
            display: flex;
        }

        .control-btn {
            pointer-events: auto;
            width: var(--control-size);
            height: var(--control-size);
            background: var(--surface);
            border: 3px solid var(--surface-outline);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-dark);
            font-size: clamp(24px, 3vw, 30px);
            cursor: pointer;
            box-shadow: 0 5px 0 var(--surface-shadow);
            transition: background 0.2s, transform 0.1s;
        }

        .control-btn:active {
            background: var(--surface-soft);
            transform: translateY(4px) scale(0.96);
            box-shadow: 0 1px 0 var(--surface-shadow);
        }

        /* Helicoptero */
        #player {
            position: absolute;
            left: 80px;
            top: 50%;
            --heli-body: #58cc02;
            --heli-body-dark: #46a600;
            --heli-accent: #ffcf48;
            --heli-tail: #2f7fd0;
            --heli-window: #a8dbff;
            --heli-window-gloss: rgba(255, 255, 255, 0.8);
            --heli-metal: #5f7d8c;
            filter: drop-shadow(0 6px 0 rgba(95, 175, 217, 0.34));
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            width: clamp(88px, 12vw, 112px);
            height: clamp(50px, 7vw, 62px);
            transform: translateY(-50%);
        }

        #plane-icon {
            display: inline-block;
            width: 100%;
            height: 100%;
            overflow: visible;
            transform: translateX(1px) rotate(var(--craft-tilt, 0deg));
            transform-origin: 46% 58%;
            transition: transform 0.12s linear;
        }

        #plane-icon .heli-body {
            fill: var(--heli-body);
        }

        #plane-icon .heli-body-dark {
            fill: var(--heli-body-dark);
        }

        #plane-icon .heli-accent {
            fill: var(--heli-accent);
        }

        #plane-icon .heli-tail {
            fill: var(--heli-tail);
        }

        #plane-icon .heli-window {
            fill: var(--heli-window);
        }

        #plane-icon .heli-window-gloss {
            fill: var(--heli-window-gloss);
        }

        #plane-icon .heli-metal {
            fill: var(--heli-metal);
        }

        #plane-icon .main-rotor {
            transform-box: fill-box;
            transform-origin: center;
            animation: helicopterRotor 0.12s linear infinite;
        }

        #plane-icon .tail-rotor {
            transform-box: fill-box;
            transform-origin: center;
            animation: tailRotor 0.16s linear infinite;
        }

        @keyframes helicopterRotor {
            0%, 100% { transform: scaleX(1); opacity: 0.98; }
            50% { transform: scaleX(0.14); opacity: 0.62; }
        }

        @keyframes tailRotor {
            0%, 100% { transform: scaleY(1); opacity: 1; }
            50% { transform: scaleY(0.2); opacity: 0.55; }
        }

        /* Nuvens */
        .option-cloud {
            --cloud-padding-y: 12px;
            --cloud-padding-x: 24px;
            --cloud-puff-size: 44px;
            position: absolute;
            padding: calc(var(--cloud-padding-y) + 10px) calc(var(--cloud-padding-x) + 8px) calc(var(--cloud-padding-y) + 28px);
            font-weight: 900;
            color: var(--ink);
            min-height: 116px;
            width: max-content;
            max-width: min(44vw, 360px);
            text-align: center;
            z-index: 10;
            isolation: isolate;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            white-space: normal;
            line-height: 1.15;
            overflow: visible;
            overflow-wrap: anywhere;
            font-size: clamp(0.95rem, 2vw, 1.05rem);
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .cloud-shape {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: visible;
            filter: drop-shadow(0 7px 12px rgba(68, 129, 157, 0.15)) drop-shadow(0 2px 0 rgba(175, 217, 238, 0.18));
        }

        .cloud-core,
        .cloud-puff {
            position: absolute;
            background: var(--surface);
        }

        .cloud-core {
            left: var(--core-left);
            top: var(--core-top);
            width: var(--core-width);
            height: var(--core-height);
            border-radius: 999px;
        }

        .cloud-label {
            position: relative;
            z-index: 1;
            display: block;
            max-width: 100%;
        }

        .cloud-puff {
            width: var(--puff-size);
            height: var(--puff-size);
            border-radius: 50%;
            left: var(--puff-left);
            top: var(--puff-top);
            transform: translateX(-50%);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(32, 79, 108, 0.78) 0%, rgba(25, 89, 120, 0.9) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        .hidden { display: none !important; }

        button.start-btn {
            padding: 15px 50px;
            font-size: 1.4rem;
            border: none;
            border-radius: 18px;
            background: var(--accent);
            color: #ffffff;
            cursor: pointer;
            margin-top: 30px;
            font-weight: 900;
            transition: 0.3s;
            box-shadow: 0 6px 0 var(--accent-dark);
        }
        button.start-btn:hover { transform: translateY(-2px); background: #69da16; }
        button.start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--accent-dark); }

        .smoke {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.72);
            border-radius: 50%;
            pointer-events: none;
            z-index: 35;
        }

        .rotor-wash {
            background: rgba(200, 232, 255, 0.78);
            filter: blur(2px);
        }

        @media (hover: hover) and (pointer: fine) and (min-width: 1025px) {
            body {
                touch-action: auto;
            }

            #game-container {
                border-width: 6px;
            }

            #mobile-controls {
                display: none !important;
            }
        }

        @media (max-width: 1024px), (pointer: coarse) {
            :root {
                --question-width: min(86vw, 520px);
            }

            #question-box {
                border-radius: 26px;
            }
        }

        @media (max-width: 900px) and (orientation: portrait) {
            :root {
                --control-size: 74px;
                --hud-gap: 10px;
                --question-width: min(90vw, 460px);
            }

            #ui-layer {
                top: calc(var(--safe-top) + 4px);
            }

            .stats {
                padding: 7px 12px;
            }

            #question-box {
                top: calc(var(--safe-top) + 52px);
                padding: 11px 18px;
            }

            button.start-btn {
                width: min(82vw, 340px);
            }
        }

        @media (max-width: 1180px) and (orientation: landscape) {
            :root {
                --control-size: 62px;
                --control-bottom-offset: calc(var(--safe-bottom) + 10px);
                --question-width: min(62vw, 460px);
            }

            #ui-layer {
                top: calc(var(--safe-top) + 2px);
            }

            .stats {
                padding: 6px 12px;
                font-size: 0.95rem;
            }

            #question-box {
                top: calc(var(--safe-top) + 2px);
                padding: 9px 18px;
                min-width: 220px;
            }

            .overlay h1 {
                font-size: clamp(2rem, 5vw, 3rem) !important;
            }

            .overlay h2 {
                font-size: clamp(2rem, 4.6vw, 2.8rem) !important;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div class="stats"><i class="fa-solid fa-star" style="color:#f1c40f"></i> <span id="score">0</span></div>
        <div class="stats"><i class="fa-solid fa-heart" style="color:#e74c3c"></i> <span id="lives">3</span></div>
    </div>

    <div id="question-box" class="hidden"></div>
    
    <div id="player" class="hidden">
        <svg id="plane-icon" viewBox="0 0 210 120" aria-hidden="true">
            <g transform="translate(210 0) scale(-1 1)">
                <rect class="heli-metal" x="82" y="26" width="10" height="16" rx="4"/>
                <g class="main-rotor">
                    <rect class="heli-metal" x="30" y="21" width="62" height="5" rx="2.5"/>
                    <rect class="heli-metal" x="92" y="21" width="88" height="5" rx="2.5"/>
                    <rect class="heli-metal" x="80" y="19" width="18" height="9" rx="4.5"/>
                </g>
                <path class="heli-tail" d="M136 56h36c16 0 25 5 30 12h-22c-2 10-10 17-21 17h-34l11-29z"/>
                <path class="heli-body" d="M40 64c0-20 16-36 36-36h34c18 0 32 10 39 28l10 27H72C54 83 40 75 40 64z"/>
                <path class="heli-body-dark" d="M104 33h6c18 0 32 10 39 28l4 11h-17c-8-16-16-28-32-39z"/>
                <path class="heli-accent" d="M50 69h99l4 10H59c-8 0-14-3-19-10h10z"/>
                <path class="heli-window" d="M90 35c16 0 29 12 31 28H70c0-15 8-28 20-28z"/>
                <path class="heli-window-gloss" d="M86 40c7 0 13 5 15 12H78c1-7 4-12 8-12z"/>
                <path class="heli-metal" d="M64 85l-9 12h13l8-12h47l8 12h14l-9-12h-72z"/>
                <path class="heli-metal" d="M49 97h49a4 4 0 0 1 0 8H44a8 8 0 0 1-8-8 8 8 0 0 1 8-8h5z"/>
                <path class="heli-metal" d="M125 97h33a4 4 0 0 1 0 8h-37a8 8 0 0 1-8-8 8 8 0 0 1 8-8h4z"/>
                <g class="tail-rotor">
                    <circle class="heli-metal" cx="186" cy="70" r="7"/>
                    <rect class="heli-accent" x="184.5" y="58" width="3" height="24" rx="1.5"/>
                    <rect class="heli-accent" x="174" y="68.5" width="24" height="3" rx="1.5"/>
                </g>
            </g>
        </svg>
    </div>

    <div id="elements-container"></div>

    <!-- Botões de Controle -->
    <div id="mobile-controls" class="hidden">
        <div id="btn-down" class="control-btn"><i class="fa-solid fa-chevron-down"></i></div>
        <div id="btn-up" class="control-btn"><i class="fa-solid fa-chevron-up"></i></div>
    </div>

    <div id="start-menu" class="overlay">
        <h1 style="font-size: 3.5rem; color: #f1c40f; margin-bottom: 5px;">VOO DO SABER</h1>
        <p style="letter-spacing: 2px; margin-bottom: 20px;">CONTROLES POR BOTÕES</p>
        <p>As nuvens agora mantêm distância!<br>Esquerda: <b>BAIXO</b> | Direita: <b>CIMA</b></p>
        <button class="start-btn" onclick="initGame()">DECOLAR</button>
    </div>

    <div id="game-over" class="overlay hidden">
        <h2 id="death-reason" style="font-size: 2.8rem; color:#e74c3c">FIM DE VOO</h2>
        <p id="correct-info" style="margin: 15px 0; font-size: 1.3rem;"></p>
        <p>Pontuação: <span id="final-score" style="font-size: 2.2rem; color: #f1c40f;">0</span></p>
        <button class="start-btn" onclick="location.reload()">RECOMECAR</button>
    </div>
</div>

<script>
    const questions = [
        { q: "9 x 6 = ?", opts: ["45", "54", "63"], ans: "54" },
        { q: "Capital de França?", opts: ["Lyon", "Paris", "Nice"], ans: "Paris" },
        { q: "Planeta Vermelho?", opts: ["Marte", "Vénus", "Terra"], ans: "Marte" },
        { q: "7 + 8 + 5 = ?", opts: ["18", "20", "22"], ans: "20" },
        { q: "É um mamífero?", opts: ["Tubarão", "Baleia", "Pipa"], ans: "Baleia" },
        { q: "Cor da Esmeralda?", opts: ["Azul", "Verde", "Vermelho"], ans: "Verde" },
        { q: "Satélite da Terra?", opts: ["Lua", "Sol", "Marte"], ans: "Lua" }
    ];

    let score = 0, lives = 3, isRunning = false;
    let currentY = 250;
    let verticalVelocity = 0;
    let hoverPhase = 0;
    let gameSpeed = 2.8; 
    
    let currentQ = null;
    let activeClouds = [];
    let lastSpawnTime = 0;
    let spawnInterval = 3000;

    const player = document.getElementById('player');
    const planeIcon = document.getElementById('plane-icon');
    const container = document.getElementById('game-container');
    const elements = document.getElementById('elements-container');
    const controls = document.getElementById('mobile-controls');
    const questionBox = document.getElementById('question-box');
    const root = document.documentElement;
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const startMenu = document.getElementById('start-menu');
    const gameOver = document.getElementById('game-over');
    const deathReason = document.getElementById('death-reason');
    const correctInfo = document.getElementById('correct-info');
    const finalScore = document.getElementById('final-score');

    const layoutState = {
        showTouchControls: false,
        topBoundary: 72,
        bottomBoundary: 72,
        cloudTop: 110,
        cloudBottom: 120,
        playerOffsetLeft: 80
    };

    // Estado dos controles
    let keys = {};
    let isPressingUp = false;
    let isPressingDown = false;

    // Teclado
    globalThis.onkeydown = (e) => keys[e.code] = true;
    globalThis.onkeyup = (e) => keys[e.code] = false;

    // Botões On-Screen
    const setupButton = (id, action) => {
        const btn = document.getElementById(id);
        const start = (e) => { e.preventDefault(); action(true); };
        const end = (e) => { e.preventDefault(); action(false); };
        
        btn.addEventListener('touchstart', start);
        btn.addEventListener('touchend', end);
        btn.addEventListener('mousedown', start);
        btn.addEventListener('mouseup', end);
        btn.addEventListener('mouseleave', end);
    };

    setupButton('btn-up', (val) => isPressingUp = val);
    setupButton('btn-down', (val) => isPressingDown = val);

    function getViewportSize() {
        const viewport = globalThis.visualViewport;
        return {
            width: viewport ? viewport.width : globalThis.innerWidth,
            height: viewport ? viewport.height : globalThis.innerHeight
        };
    }

    function shouldUseTouchLayout() {
        const { width, height } = getViewportSize();
        const largestSide = Math.max(width, height);
        const hasTouch = globalThis.matchMedia('(pointer: coarse)').matches || navigator.maxTouchPoints > 0;
        return hasTouch && largestSide <= 1366;
    }

    function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
    }

    function updateControlsVisibility() {
        if (layoutState.showTouchControls && isRunning) {
            controls.classList.add('active');
            controls.classList.remove('hidden');
            return;
        }

        controls.classList.remove('active');
        controls.classList.add('hidden');
    }

    function updateLayout() {
        const viewport = getViewportSize();
        const isLandscape = viewport.width > viewport.height;
        const showTouchControls = shouldUseTouchLayout();

        root.style.setProperty('--viewport-height', `${viewport.height}px`);
        layoutState.showTouchControls = showTouchControls;
        document.body.classList.toggle('touch-layout', showTouchControls);

        const isCompactPortrait = viewport.width <= 900 && !isLandscape;
        const topBoundary = isCompactPortrait ? 118 : 76;
        const cloudTop = isCompactPortrait ? 150 : 94;
        let bottomSpacing = 72;
        let cloudBottom = 56;

        if (showTouchControls) {
            bottomSpacing = isLandscape ? 92 : 128;
            cloudBottom = isLandscape ? 96 : 138;
        }

        const playerOffsetLeft = clamp(viewport.width * (showTouchControls ? 0.16 : 0.11), 54, 140);

        layoutState.topBoundary = topBoundary;
        layoutState.bottomBoundary = bottomSpacing;
        layoutState.cloudTop = cloudTop;
        layoutState.cloudBottom = cloudBottom;
        layoutState.playerOffsetLeft = playerOffsetLeft;

        player.style.left = `${playerOffsetLeft}px`;
        currentY = clamp(currentY, topBoundary, container.offsetHeight - bottomSpacing);
        verticalVelocity = clamp(verticalVelocity, -4.6, 4.6);
        player.style.top = `${currentY}px`;

        updateControlsVisibility();
    }

    globalThis.addEventListener('resize', updateLayout);
    globalThis.addEventListener('orientationchange', () => setTimeout(updateLayout, 120));
    if (globalThis.visualViewport) {
        globalThis.visualViewport.addEventListener('resize', updateLayout);
    }

    updateLayout();

    function initGame() {
        startMenu.classList.add('hidden');
        questionBox.classList.remove('hidden');
        player.classList.remove('hidden');
        updateLayout();
        isRunning = true;
        updateControlsVisibility();
        nextQuestion();
        requestAnimationFrame(gameLoop);
    }

    function nextQuestion() {
        currentQ = questions[Math.floor(Math.random() * questions.length)];
        questionBox.innerText = currentQ.q;
        activeClouds.forEach(c => c.el.remove());
        activeClouds = [];
        spawnClouds();
    }

    function getCloudSizing(text, viewportWidth) {
        const charCount = text.length;
        const maxWidth = clamp(viewportWidth * (layoutState.showTouchControls ? 0.5 : 0.4), 190, 360);
        const width = clamp(150 + (charCount * 13), 150, maxWidth);
        const puffSize = clamp(46 + (charCount * 1.9), 46, 68);
        const paddingX = clamp(28 + (charCount * 0.9), 28, 52);
        const paddingY = charCount > 10 ? 18 : 16;

        return { width, puffSize, paddingX, paddingY };
    }

    function seededNoise(seed) {
        const value = Math.sin(seed) * 10000;
        return value - Math.floor(value);
    }

    function buildProceduralCloud(cloudEl, text, cloudSizing, seedBase) {
        cloudEl.replaceChildren();

        const shape = document.createElement('span');
        shape.className = 'cloud-shape';
        shape.setAttribute('aria-hidden', 'true');

        const core = document.createElement('span');
        core.className = 'cloud-core';

        const profiles = [
            {
                core: { width: 92, height: 48, top: 22, offset: 0 },
                lobes: [
                    { left: 11, scale: 0.78, rise: 0.14 },
                    { left: 29, scale: 0.96, rise: 0.34 },
                    { left: 50, scale: 1.1, rise: 0.62 },
                    { left: 71, scale: 0.96, rise: 0.34 },
                    { left: 89, scale: 0.78, rise: 0.14 }
                ]
            },
            {
                core: { width: 88, height: 50, top: 20, offset: 0 },
                lobes: [
                    { left: 14, scale: 0.8, rise: 0.2 },
                    { left: 33, scale: 0.98, rise: 0.42 },
                    { left: 50, scale: 1.14, rise: 0.72 },
                    { left: 67, scale: 1.02, rise: 0.44 },
                    { left: 86, scale: 0.8, rise: 0.2 }
                ]
            },
            {
                core: { width: 94, height: 46, top: 24, offset: -2 },
                lobes: [
                    { left: 10, scale: 0.76, rise: 0.1 },
                    { left: 26, scale: 0.88, rise: 0.3 },
                    { left: 44, scale: 1.02, rise: 0.54 },
                    { left: 62, scale: 0.98, rise: 0.42 },
                    { left: 78, scale: 0.9, rise: 0.26 },
                    { left: 92, scale: 0.74, rise: 0.1 }
                ]
            }
        ];

        const profile = profiles[Math.floor(seededNoise(seedBase + 7.19) * profiles.length)];
        const coreWidth = clamp(profile.core.width + ((seededNoise(seedBase + 11.3) - 0.5) * 5), 88, 100);
        const coreHeight = clamp(profile.core.height + ((seededNoise(seedBase + 13.7) - 0.5) * 4), 42, 56);
        const coreLeft = clamp(
            50 - (coreWidth / 2) + profile.core.offset + ((seededNoise(seedBase + 17.1) - 0.5) * 4),
            2,
            10
        );
        const coreTop = clamp(profile.core.top + ((seededNoise(seedBase + 19.9) - 0.5) * 4), 16, 28);

        core.style.setProperty('--core-left', `${coreLeft}%`);
        core.style.setProperty('--core-top', `${coreTop}%`);
        core.style.setProperty('--core-width', `${coreWidth}%`);
        core.style.setProperty('--core-height', `${coreHeight}%`);
        shape.appendChild(core);

        const supportLobes = profile.lobes.slice(0, -1).map((lobe, index) => {
            const nextLobe = profile.lobes[index + 1];
            return {
                left: (lobe.left + nextLobe.left) / 2,
                scale: ((lobe.scale + nextLobe.scale) / 2) * 0.96,
                rise: Math.max(0.08, ((lobe.rise + nextLobe.rise) / 2) - 0.26)
            };
        });

        const centerFillLobes = [
            { left: 34, scale: 0.82, rise: 0.12 },
            { left: 50, scale: 0.94, rise: 0.08 },
            { left: 66, scale: 0.82, rise: 0.12 }
        ];

        const bottomFillLobes = [
            { left: 16, scale: 0.85, rise: -0.9 },
            { left: 33, scale: 0.98, rise: -1.1 },
            { left: 50, scale: 1.06, rise: -1.2 },
            { left: 67, scale: 0.98, rise: -1.1 },
            { left: 84, scale: 0.85, rise: -0.9 }
        ];

        const allLobes = [...bottomFillLobes, ...centerFillLobes, ...supportLobes, ...profile.lobes];

        allLobes.forEach((lobe, puffIndex) => {
            const puff = document.createElement('span');
            puff.className = 'cloud-puff';

            const sizeNoise = seededNoise(seedBase + 31.1 + (puffIndex * 2.17));
            const leftNoise = seededNoise(seedBase + 47.2 + (puffIndex * 1.41));
            const topNoise = seededNoise(seedBase + 59.6 + (puffIndex * 1.83));

            const size = Math.round(
                clamp(cloudSizing.puffSize * lobe.scale * (0.92 + (sizeNoise * 0.14)), 28, 78)
            );
            const left = clamp(lobe.left + ((leftNoise - 0.5) * 4), 6, 94);
            const top = Math.round(-size * lobe.rise + ((topNoise - 0.5) * 4));

            puff.style.setProperty('--puff-size', `${size}px`);
            puff.style.setProperty('--puff-left', `${left}%`);
            puff.style.setProperty('--puff-top', `${top}px`);
            shape.appendChild(puff);
        });

        const label = document.createElement('span');
        label.className = 'cloud-label';
        label.textContent = text;

        cloudEl.appendChild(shape);
        cloudEl.appendChild(label);
    }

    function spawnClouds() {
        const rect = container.getBoundingClientRect();
        let shuffledOpts = [...currentQ.opts].sort(() => Math.random() - 0.5);
        const cloudTopBoundary = layoutState.cloudTop;
        const cloudBottomBoundary = rect.height - layoutState.cloudBottom;
        const availableHeight = Math.max(180, cloudBottomBoundary - cloudTopBoundary);
        const laneHeight = Math.max(148, availableHeight / shuffledOpts.length);

        shuffledOpts.forEach((text, i) => {
            const div = document.createElement('div');
            div.className = 'option-cloud';
            const cloudSizing = getCloudSizing(text, rect.width);
            const cloudSeed = Math.random() * 1000 + (i * 37) + (text.length * 19);
            const laneStart = cloudTopBoundary + (laneHeight * i);
            const yPadding = Math.min(28, laneHeight * 0.2);
            const yMin = laneStart + yPadding;
            const yMax = Math.min(cloudBottomBoundary - yPadding, laneStart + laneHeight - yPadding);
            const y = clamp(yMin + (Math.random() * Math.max(8, yMax - yMin)), cloudTopBoundary + 24, cloudBottomBoundary - 24);
            
            let startPosX = -200 - (i * Math.max(320, rect.width * 0.55)) - (Math.random() * Math.max(80, rect.width * 0.1)); 

            div.style.top = y + 'px';
            div.style.width = `${cloudSizing.width}px`;
            div.style.maxWidth = `${Math.min(cloudSizing.width, rect.width - 40)}px`;
            div.style.setProperty('--cloud-padding-x', `${cloudSizing.paddingX}px`);
            div.style.setProperty('--cloud-padding-y', `${cloudSizing.paddingY}px`);
            div.style.setProperty('--cloud-puff-size', `${cloudSizing.puffSize}px`);
            div.style.transform = 'translateY(-50%)';
            div.style.right = startPosX + 'px';

            buildProceduralCloud(div, text, cloudSizing, cloudSeed);
            
            elements.appendChild(div);
            
            activeClouds.push({
                el: div,
                text: text,
                x: startPosX,
                y: y,
                h: 124,
                speedMod: 0.8 + (Math.random() * 0.3)
            });
        });
        lastSpawnTime = Date.now();
    }

    function separateClouds() {
        if (activeClouds.length < 2) return;
        const minGapY = 20;
        const topBound = layoutState.cloudTop + 20;
        const bottomBound = container.offsetHeight - layoutState.cloudBottom - 20;

        for (let iter = 0; iter < 6; iter++) {
            let moved = false;
            for (let i = 0; i < activeClouds.length; i++) {
                for (let j = i + 1; j < activeClouds.length; j++) {
                    const a = activeClouds[i];
                    const b = activeClouds[j];

                    // Only check clouds that are horizontally near each other
                    const aW = (a.el.offsetWidth || 200);
                    const bW = (b.el.offsetWidth || 200);
                    if (Math.abs(a.x - b.x) > (aW + bW) / 2 + 60) continue;

                    const minDist = a.h / 2 + b.h / 2 + minGapY;
                    const dist = Math.abs(a.y - b.y);
                    if (dist >= minDist) continue;

                    const push = (minDist - dist) / 2;
                    moved = true;
                    if (a.y <= b.y) {
                        a.y = clamp(a.y - push, topBound, bottomBound);
                        b.y = clamp(b.y + push, topBound, bottomBound);
                    } else {
                        a.y = clamp(a.y + push, topBound, bottomBound);
                        b.y = clamp(b.y - push, topBound, bottomBound);
                    }
                }
            }
            if (!moved) break;
        }

        activeClouds.forEach(c => { c.el.style.top = c.y + 'px'; });
    }

    function createRotorWash() {
        const wash = document.createElement('div');
        wash.className = 'smoke rotor-wash';

        // Spawn at the tail (left side) of the helicopter, vertically centered
        const startX = player.offsetLeft - 6 + (Math.random() * 8 - 4);
        const startY = player.offsetTop + (player.offsetHeight * 0.52) + (Math.random() * 10 - 5);

        wash.style.left = `${startX}px`;
        wash.style.top = `${startY}px`;
        elements.appendChild(wash);

        let opacity = 0.72;
        let size = 14;
        let x = startX;
        let y = startY;

        const anim = setInterval(() => {
            opacity -= 0.028;
            size += 1.8;
            x -= 2.4 + (Math.random() * 1.2);  // drift left (away from heli tail)
            y += (Math.random() * 2 - 1) * 0.6; // slight vertical wobble
            wash.style.opacity = opacity;
            wash.style.width = `${size}px`;
            wash.style.height = `${size}px`;
            wash.style.left = `${x}px`;
            wash.style.top = `${y - size / 2}px`;
            if (opacity <= 0) {
                clearInterval(anim);
                wash.remove();
            }
        }, 30);
    }

    function updatePlayerPosition() {
        const movingUp = keys['ArrowUp'] || isPressingUp;
        const movingDown = keys['ArrowDown'] || isPressingDown;
        const topLimit = layoutState.topBoundary;
        const bottomLimit = container.offsetHeight - layoutState.bottomBoundary;
        const acceleration = 0.38;
        const damping = movingUp || movingDown ? 0.94 : 0.78;
        const maxVelocity = 4.8;

        if (movingUp && !movingDown) {
            verticalVelocity -= acceleration;
        } else if (movingDown && !movingUp) {
            verticalVelocity += acceleration;
        }

        verticalVelocity *= damping;
        verticalVelocity = clamp(verticalVelocity, -maxVelocity, maxVelocity);

        currentY += verticalVelocity;
        if (currentY <= topLimit) {
            currentY = topLimit;
            verticalVelocity = Math.max(0, verticalVelocity * 0.35);
        } else if (currentY >= bottomLimit) {
            currentY = bottomLimit;
            verticalVelocity = Math.min(0, verticalVelocity * 0.35);
        }

        hoverPhase += movingUp || movingDown ? 0.24 : 0.14;
        const hoverBob = Math.sin(hoverPhase) * 1.6;
        player.style.top = `${currentY + hoverBob}px`;

        const tilt = clamp(verticalVelocity * 2.3, -10, 10);
        planeIcon.style.setProperty('--craft-tilt', `${tilt}deg`);
        return verticalVelocity;
    }

    function handleCloudCollision(cloud, index) {
        if (cloud.text === currentQ.ans) {
            handleSuccess();
            return true;
        }

        handleError();
        cloud.el.remove();
        activeClouds.splice(index, 1);
        return false;
    }

    function updateClouds(playerRect) {
        for (let i = activeClouds.length - 1; i >= 0; i--) {
            const cloud = activeClouds[i];
            cloud.x += gameSpeed * cloud.speedMod;
            cloud.el.style.right = cloud.x + 'px';

            const cloudRect = cloud.el.getBoundingClientRect();
            const isColliding = playerRect.right > cloudRect.left + 5 &&
                playerRect.left < cloudRect.right - 5 &&
                playerRect.bottom > cloudRect.top + 5 &&
                playerRect.top < cloudRect.bottom - 5;

            if (isColliding) {
                return handleCloudCollision(cloud, i);
            }

            if (cloudRect.right < -250) {
                cloud.el.remove();
                activeClouds.splice(i, 1);
            }
        }

        return false;
    }

    function maybeSpawnClouds(correctCaptured) {
        if (correctCaptured || !isRunning) {
            return;
        }

        if (activeClouds.length === 0 || (Date.now() - lastSpawnTime > spawnInterval * 1.8)) {
            spawnClouds();
        }
    }

    function updateHud() {
        scoreEl.innerText = score;
        livesEl.innerText = lives;
    }

    function gameLoop() {
        if(!isRunning) return;

        updatePlayerPosition();

        if(Math.random() > 0.72) createRotorWash();

        const pRect = player.getBoundingClientRect();
        const correctCaptured = updateClouds(pRect);

        separateClouds();
        maybeSpawnClouds(correctCaptured);
        updateHud();
        requestAnimationFrame(gameLoop);
    }

    function handleSuccess() {
        score += 10;
        gameSpeed += 0.08;
        container.classList.add('flash-green');
        setTimeout(() => container.classList.remove('flash-green'), 400);
        nextQuestion();
    }

    function handleError() {
        lives--;
        container.classList.add('flash-red');
        setTimeout(() => container.classList.remove('flash-red'), 400);
        
        if(lives <= 0) {
            isRunning = false;
            updateControlsVisibility();
            gameOver.classList.remove('hidden');
            deathReason.innerText = "FIM DE VOO";
            correctInfo.innerText = "A resposta era: " + currentQ.ans;
            finalScore.innerText = score;
        }
    }
</script>
