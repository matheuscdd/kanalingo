<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime Drop Educativo</title>
    
    <!-- Fonte Nunito (Estilo Flat/Duolingo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIÁVEIS DE COR E ESTILO --- */
        :root {
            --bg-sky: #89E2FE;
            --text-main: #4B4B4B;
            
            --green-main: #58CC02;
            --green-dark: #46A302;
            
            --blue-main: #1CB0F6;
            --blue-dark: #1899D6;
            
            --red-main: #FF4B4B;
            --red-dark: #D33131;
            
            --yellow-main: #FFC800;
            --purple-main: #CE82FF;
            --purple-light: #F3E5F5;
            
            --gray-light: #E5E5E5;
            --white: #FFFFFF;
        }

        /* --- RESET E BASE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-sky);
            font-family: 'Nunito', sans-serif;
            color: var(--text-main);
            touch-action: none; /* Previne scroll/zoom em dispositivos móveis */
        }

        /* --- CANVAS --- */
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* --- CLASSES UTILITÁRIAS --- */
        .hidden {
            display: none !important;
        }

        /* --- OVERLAYS E MODAIS --- */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 50;
        }

        .modal {
            background-color: var(--white);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 8px 0 0 rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 28rem;
            width: 90%;
            border: 4px solid var(--gray-light);
        }

        /* Tipografia Modal */
        .modal-title {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }
        .modal-title.green { color: var(--green-main); }
        .modal-title.red { color: var(--red-main); }

        .modal-subtitle {
            font-weight: 700;
            font-size: 1.125rem;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .modal-score {
            color: var(--purple-main);
            font-weight: 900;
            font-size: 1.875rem;
            margin-bottom: 1.5rem;
        }

        /* --- BOTÕES FLAT 3D --- */
        .btn {
            width: 100%;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            padding: 1rem;
            border-radius: 1rem;
            border: none;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.2s;
            text-transform: uppercase;
        }

        .btn-green {
            background-color: var(--green-main);
            color: var(--white);
            box-shadow: 0 6px 0 0 var(--green-dark);
        }
        .btn-green:hover { background-color: var(--green-dark); }
        .btn-green:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 0 transparent;
        }

        .btn-blue {
            background-color: var(--blue-main);
            color: var(--white);
            box-shadow: 0 6px 0 0 var(--blue-dark);
        }
        .btn-blue:hover { background-color: var(--blue-dark); }
        .btn-blue:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 0 transparent;
        }

        .btn-red {
            background-color: var(--red-main);
            color: var(--white);
            box-shadow: 0 4px 0 0 var(--red-dark);
            font-size: 1rem; /* Texto mais pequeno no ecrã de jogo */
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            width: auto;
        }
        .btn-red:hover { background-color: var(--red-dark); }
        .btn-red:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 transparent;
        }

        /* --- HUD (Heads Up Display) --- */
        .hud-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            z-index: 40;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .score-box {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            border: 2px solid var(--gray-light);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-weight: 900;
            font-size: 1.25rem;
        }

        .star-icon { color: var(--yellow-main); }
        
        .multiplier-badge {
            color: var(--purple-main);
            background-color: var(--purple-light);
            padding: 0.125rem 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
        }

        .timer-box {
            background-color: rgba(255, 255, 255, 0.9);
            color: var(--blue-main);
            border-radius: 1rem;
            padding: 0.5rem 1.25rem;
            border: 2px solid rgba(255, 255, 255, 0.5);
            font-weight: 900;
            font-size: 1.5rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: background-color 0.3s, color 0.3s;
        }

        /* Estado de Alerta do Temporizador */
        .timer-box.danger {
            background-color: var(--red-main);
            color: var(--white);
            animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .question-box {
            width: 100%;
            max-width: 42rem;
            margin: 0 auto;
            background-color: var(--white);
            border-bottom: 4px solid var(--gray-light);
            border-radius: 1.5rem;
            padding: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            text-align: center;
        }

        .question-text {
            font-weight: 900;
            font-size: 1.25rem;
            line-height: 1.3;
        }

        @media (min-width: 640px) {
            .question-text { font-size: 1.5rem; }
        }

        /* --- CONTROLOS MOBILE --- */
        .controls-container {
            position: absolute;
            bottom: 1.5rem;
            left: 0;
            width: 100%;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 40;
            pointer-events: none;
        }

        .controls-group {
            display: flex;
            gap: 0.5rem;
            pointer-events: auto;
        }

        .controls-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.75rem;
            pointer-events: auto;
        }

        .ctrl-btn {
            background-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-bottom: 4px solid rgba(209, 213, 219, 0.5);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            width: 4rem;
            height: 4rem;
            cursor: pointer;
            transition: background-color 0.1s, border-bottom-width 0.1s, transform 0.1s;
        }

        .ctrl-btn svg {
            width: 2rem;
            height: 2rem;
            color: var(--text-main);
        }

        .ctrl-btn:active {
            background-color: rgba(255, 255, 255, 0.8);
            border-bottom-width: 0px;
            transform: translateY(4px);
        }

        .jump-btn {
            background-color: rgba(28, 176, 246, 0.8);
            border-bottom: none;
            box-shadow: 0 6px 0 0 rgba(24, 153, 214, 0.8);
            width: 5rem;
            height: 5rem;
        }
        .jump-btn svg { color: var(--white); width: 2.5rem; height: 2.5rem; }
        .jump-btn:active {
            background-color: var(--blue-main);
            transform: translateY(6px);
            box-shadow: 0 0 0 0 transparent;
        }

        @media (min-width: 640px) {
            .controls-group { gap: 1rem; }
            .ctrl-btn { width: 5rem; height: 5rem; }
            .jump-btn { width: 6rem; height: 6rem; }
        }
    </style>
</head>
<body>

    <!-- CANVAS DO JOGO -->
    <canvas id="game-canvas"></canvas>

    <!-- UI OVERLAYS -->

    <!-- MENU PRINCIPAL -->
    <div id="menu-overlay" class="overlay">
        <div class="modal">
            <h1 class="modal-title green">Slime Drop</h1>
            <p class="modal-subtitle">Escolha a plataforma certa antes que o tempo acabe!</p>
            <button id="btn-start" class="btn btn-green">COMEÇAR JOGO</button>
        </div>
    </div>

    <!-- ECRÃ DE GAME OVER -->
    <div id="gameover-overlay" class="overlay hidden">
        <div class="modal">
            <h1 class="modal-title red">Oh não...</h1>
            <p class="modal-subtitle">O seu slime caiu no ácido!</p>
            <p id="final-score-text" class="modal-score">Pontuação: 0</p>
            <button id="btn-restart" class="btn btn-blue">TENTAR NOVAMENTE</button>
        </div>
    </div>

    <!-- HUD (Heads Up Display) -->
    <div id="hud-overlay" class="hud-container hidden">
        <!-- Top Bar: Pontos e Tempo -->
        <div class="hud-top">
            <div class="score-box">
                <span class="star-icon">★</span>
                <span id="score-text">0</span>
                <span id="multiplier-container" class="multiplier-badge hidden">
                    <span id="multiplier-text">x1</span>
                </span>
            </div>

            <div id="timer-container" class="timer-box">
                <span id="timer-text">15s</span>
            </div>
        </div>

        <!-- Pergunta -->
        <div class="question-box">
            <h2 id="question-text" class="question-text">Pergunta?</h2>
        </div>
    </div>

    <!-- CONTROLOS MOBILE -->
    <div id="controls-overlay" class="controls-container hidden">
        
        <!-- Esquerda / Direita -->
        <div class="controls-group">
            <button id="btn-left" class="ctrl-btn">
                <svg fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <button id="btn-right" class="ctrl-btn">
                <svg fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>

        <!-- Ações Direita -->
        <div class="controls-right">
            <button id="btn-drop" class="btn btn-red">
                Dropar Já! ↓
            </button>

            <button id="btn-jump" class="ctrl-btn jump-btn">
                <svg fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"></path></svg>
            </button>
        </div>
    </div>

    <!-- SCRIPTS DO JOGO (Lógica de física e controlo do DOM) -->
    <script>
        // --- CONFIGURAÇÕES E CONSTANTES ---
        const COLORS = {
            bgTop: '#89E2FE',
            bgBottom: '#C6F1FF',
            slimeBase: '#58CC02',
            slimeHighlight: '#89E219',
            slimeDark: '#46A302',
            text: '#4B4B4B',
            white: '#FFFFFF',
            safeGroundTop: '#A55D35',
            safeGroundMid: '#784224',
            acidTop: '#AEEA00', // Verde-limão tóxico
            acidMid: '#93C800',
            acidBubble: '#C6FF00',
            platforms: ['#1CB0F6', '#FFC800', '#CE82FF', '#FF9600']
        };

        const QUESTIONS = [
            { q: "Qual a capital do Japão?", options: ["Quioto", "Osaka", "Tóquio", "Seul"], correct: 2 },
            { q: "Quanto é 7 x 8?", options: ["48", "54", "56", "64"], correct: 2 },
            { q: "Qual é o maior planeta do sistema solar?", options: ["Terra", "Marte", "Saturno", "Júpiter"], correct: 3 },
            { q: "Qual cor resulta da mistura de Azul e Amarelo?", options: ["Verde", "Roxo", "Laranja", "Castanho"], correct: 0 },
            { q: "Como se diz 'Obrigado' em inglês?", options: ["Please", "Thanks", "Sorry", "Hello"], correct: 1 },
            { q: "Quantos continentes existem?", options: ["5", "6", "7", "8"], correct: 2 },
            { q: "Qual o símbolo químico do Ouro?", options: ["Ag", "Au", "O", "Or"], correct: 1 },
        ];

        // --- MOTOR DO JOGO ---
        class GameEngine {
            constructor(canvas, onUIUpdate) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d', { alpha: false });
                this.onUIUpdate = onUIUpdate;
                
                this.width = 0;
                this.height = 0;
                this.dpr = window.devicePixelRatio || 1;
                
                this.lastTime = 0;
                this.animId = null;
                
                this.cameraY = 0;
                this.targetCameraY = 0;
                this.baseY = 0; 
                this.oldBaseY = undefined;
                this.oldSafeZone = null;

                this.state = 'MENU'; // MENU, PLAYING, FALLING, RESOLVE, TRANSITION, GAMEOVER
                this.score = 0;
                this.streak = 0;
                this.multiplier = 1;
                this.timer = 15;
                this.currentQuestion = null;
                
                this.slime = { x: 0, y: 0, vx: 0, vy: 0, w: 40, h: 40, sx: 1, sy: 1, tsx: 1, tsy: 1, grounded: false, state: 'normal' };
                this.platforms = [];
                this.particles = [];
                this.acidBubbles = [];
                this.consequenceZones = []; 
                this.cloudY = 0; 
                
                this.keys = { left: false, right: false, jump: false };
                
                this.resize();
                window.addEventListener('resize', this.resize.bind(this));
                
                this.animId = requestAnimationFrame(this.loop.bind(this));
            }

            resize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.canvas.width = this.width * this.dpr;
                this.canvas.height = this.height * this.dpr;
                this.ctx.scale(this.dpr, this.dpr);
                
                if (this.state === 'MENU') {
                    this.slime.x = this.width / 2;
                    this.slime.y = this.height / 2;
                }
            }

            start() {
                this.score = 0;
                this.streak = 0;
                this.multiplier = 1;
                this.cameraY = 0;
                this.baseY = 0;
                this.targetCameraY = 0;
                this.oldBaseY = undefined;
                this.oldSafeZone = null;
                this.slime.x = this.width / 2;
                this.slime.y = 50;
                this.nextLevel(true);
            }

            nextLevel(isInitial = false) {
                this.currentQuestion = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
                this.particles = [];

                if (isInitial) {
                    this.state = 'PLAYING';
                    this.timer = 15;
                    this.baseY = 0;
                    this.slime.vx = 0;
                    this.slime.vy = 0;
                    this.slime.state = 'normal';
                } else {
                    this.state = 'TRANSITION';
                    this.oldBaseY = this.baseY;
                    this.oldSafeZone = this.consequenceZones.find(z => z.type === 'safe');
                    
                    this.targetCameraY = this.slime.y - 50;
                    this.baseY = this.targetCameraY; 
                }

                this.cloudY = this.baseY + this.height * 0.65; 
                
                this.platforms = [];
                this.consequenceZones = [];
                const margin = 10;
                const totalMargin = margin * 5;
                const platW = (this.width - totalMargin) / 4;
                const platH = Math.min(60, this.height * 0.1);
                const platY = this.baseY + this.height * 0.45; 

                for (let i = 0; i < 4; i++) {
                    const px = margin + i * (platW + margin);
                    this.platforms.push({
                        id: i,
                        x: px,
                        y: platY,
                        w: platW,
                        h: platH,
                        color: COLORS.platforms[i],
                        text: this.currentQuestion.options[i],
                        isCorrect: i === this.currentQuestion.correct,
                        shakeOffX: 0,
                        shakeOffY: 0
                    });

                    const isSafe = i === this.currentQuestion.correct;
                    this.consequenceZones.push({
                        x: px - margin/2,
                        y: this.baseY + (isSafe ? this.height * 0.85 : this.height * 0.70), 
                        w: platW + margin,
                        h: this.height,
                        type: isSafe ? 'safe' : 'acid'
                    });
                }

                this.acidBubbles = [];
                for(let i=0; i<20; i++) {
                    this.acidBubbles.push({
                        x: Math.random() * this.width,
                        y: this.baseY + this.height * 0.7 + Math.random() * 100,
                        s: Math.random() * 6 + 2,
                        vy: -Math.random() * 20 - 10,
                        life: Math.random()
                    });
                }

                this.triggerUIUpdate();
            }

            triggerUIUpdate() {
                if (this.onUIUpdate) {
                    this.onUIUpdate({
                        state: this.state,
                        score: this.score,
                        timer: Math.ceil(this.timer),
                        streak: this.streak,
                        multiplier: this.multiplier,
                        question: this.currentQuestion?.q
                    });
                }
            }

            triggerFall() {
                if (this.state !== 'PLAYING') return;
                this.state = 'FALLING';
                
                this.platforms.forEach(p => {
                    for (let i = 0; i < 15; i++) {
                        this.particles.push({
                            x: p.x + Math.random() * p.w,
                            y: p.y + Math.random() * p.h,
                            vx: (Math.random() - 0.5) * 200,
                            vy: (Math.random() - 0.5) * 200 - 100,
                            size: Math.random() * 8 + 4,
                            color: p.color,
                            life: 1.0
                        });
                    }
                });
                this.platforms = []; 
                this.triggerUIUpdate();
            }

            loop(timestamp) {
                if (!this.lastTime) this.lastTime = timestamp;
                const dt = Math.min((timestamp - this.lastTime) / 1000, 0.05);
                this.lastTime = timestamp;

                this.update(dt);
                this.draw();

                this.animId = requestAnimationFrame(this.loop.bind(this));
            }

            update(dt) {
                const speed = 300;
                const gravity = 1200;
                const jumpForce = 600;

                // Transição de Câmara
                if (this.state === 'TRANSITION') {
                    let diff = this.targetCameraY - this.cameraY;
                    let moveY = 1500 * dt; 
                    
                    if (Math.abs(diff) <= moveY) {
                        this.cameraY = this.targetCameraY;
                        this.state = 'PLAYING';
                        this.timer = 15;
                        
                        if (this.oldSafeZone) {
                            for(let i=0; i<30; i++) {
                                this.particles.push({
                                    x: this.oldSafeZone.x + Math.random() * this.oldSafeZone.w,
                                    y: this.oldSafeZone.y + Math.random() * 20,
                                    vx: (Math.random()-0.5)*300, vy: (Math.random()-0.5)*200 - 50,
                                    size: Math.random()*8+4, color: COLORS.safeGroundTop, life: 1.0
                                });
                            }
                        }
                        this.oldSafeZone = null;
                        this.slime.state = 'normal';
                        this.slime.vy = -150; 
                        this.slime.grounded = false;
                        this.triggerUIUpdate();
                    } else {
                        this.cameraY += Math.sign(diff) * moveY;
                    }
                    
                    if (this.keys.left) this.slime.vx = -speed;
                    else if (this.keys.right) this.slime.vx = speed;
                    else this.slime.vx *= 0.8;
                    this.slime.x += this.slime.vx * dt;
                }

                // Lógica principal do Slime
                if (['PLAYING', 'FALLING', 'RESOLVE'].includes(this.state)) {
                    
                    if (this.keys.left) this.slime.vx = -speed;
                    else if (this.keys.right) this.slime.vx = speed;
                    else this.slime.vx *= 0.8; 

                    if (this.keys.jump && this.slime.grounded && this.state !== 'FALLING') {
                        this.slime.vy = -jumpForce;
                        this.slime.grounded = false;
                        this.slime.tsx = 0.6; 
                        this.slime.tsy = 1.4;
                    }

                    this.slime.vy += gravity * dt;
                    this.slime.x += this.slime.vx * dt;
                    this.slime.y += this.slime.vy * dt;

                    if (this.slime.x - this.slime.w/2 < 0) {
                        this.slime.x = this.slime.w/2;
                        this.slime.vx = 0;
                    }
                    if (this.slime.x + this.slime.w/2 > this.width) {
                        this.slime.x = this.width - this.slime.w/2;
                        this.slime.vx = 0;
                    }

                    this.slime.grounded = false;
                    
                    if (this.state === 'PLAYING' && this.slime.vy > 0) {
                        for (let p of this.platforms) {
                            if (this.slime.x + this.slime.w/4 > p.x && 
                                this.slime.x - this.slime.w/4 < p.x + p.w &&
                                this.slime.y + this.slime.h/2 >= p.y && 
                                this.slime.y - this.slime.vy*dt + this.slime.h/2 <= p.y + 10) { 
                                
                                this.slime.y = p.y - this.slime.h/2;
                                this.slime.vy = 0;
                                if (!this.slime.grounded) {
                                    this.slime.tsx = 1.3; 
                                    this.slime.tsy = 0.7;
                                }
                                this.slime.grounded = true;
                            }
                        }
                    }

                    if ((this.state === 'FALLING' || this.state === 'RESOLVE') && this.slime.vy > 0) {
                        for (let zone of this.consequenceZones) {
                            if (this.slime.x > zone.x && this.slime.x < zone.x + zone.w) {
                                if (this.slime.y + this.slime.h/2 >= zone.y) {
                                    this.slime.y = zone.y - this.slime.h/2;
                                    if (this.state === 'FALLING') {
                                        this.resolveDrop(zone.type);
                                    } else if (this.state === 'RESOLVE' && zone.type === 'safe') {
                                        this.slime.grounded = true;
                                        this.slime.vy = 0;
                                    }
                                    break;
                                }
                            }
                        }
                    }

                    // Squash & Stretch visual update
                    if (!this.slime.grounded) {
                        if (this.slime.vy > 0) { 
                            this.slime.tsx = 0.8;
                            this.slime.tsy = 1.2;
                        }
                    } else {
                        this.slime.tsx += (1 - this.slime.tsx) * 10 * dt;
                        this.slime.tsy += (1 - this.slime.tsy) * 10 * dt;
                    }
                    this.slime.sx += (this.slime.tsx - this.slime.sx) * 15 * dt;
                    this.slime.sy += (this.slime.tsy - this.slime.sy) * 15 * dt;
                }

                // Temporizador
                if (this.state === 'PLAYING') {
                    this.timer -= dt;
                    
                    if (this.timer < 5) {
                        const intensity = (5 - this.timer);
                        this.platforms.forEach(p => {
                            p.shakeOffX = (Math.random() - 0.5) * intensity * 2;
                            p.shakeOffY = (Math.random() - 0.5) * intensity * 2;
                            
                            if (Math.random() < 0.1) {
                                this.particles.push({
                                    x: p.x + Math.random() * p.w,
                                    y: p.y + p.h,
                                    vx: 0, vy: Math.random() * 50 + 20,
                                    size: Math.random() * 4 + 2,
                                    color: p.color,
                                    life: 1.0
                                });
                            }
                        });
                    }

                    if (this.timer <= 0) {
                        this.triggerFall();
                    } else {
                        // Atualiza a UI todo frame para manter o timer suave visualmente
                        this.triggerUIUpdate();
                    }
                }

                // Nuvens a descer para revelar
                if (this.state === 'FALLING' || this.state === 'RESOLVE') {
                    this.cloudY -= 1200 * dt; 
                }

                // Consequências
                if (this.state === 'RESOLVE') {
                    if (this.slime.state === 'melting') {
                        this.slime.sy = Math.max(0, this.slime.sy - dt * 0.5); 
                        this.slime.sx = Math.min(2, this.slime.sx + dt * 0.5); 
                        this.slime.y += dt * 20; 
                    } else if (this.slime.state === 'happy') {
                        if (Math.random() < 0.05 && this.slime.grounded) {
                            this.slime.vy = -300;
                            this.slime.grounded = false;
                        }
                    }
                }

                // Atualizar Partículas
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.vy += gravity * 0.5 * dt; 
                    p.life -= dt * 1.5;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }

                // Atualizar Bolhas
                this.acidBubbles.forEach(b => {
                    b.y += b.vy * dt;
                    b.life -= dt * 0.5;
                    if (b.life <= 0) {
                        b.y = this.baseY + this.height * 0.7 + Math.random() * 50;
                        b.life = 1.0;
                        b.x = Math.random() * this.width;
                    }
                });
            }

            resolveDrop(type) {
                this.state = 'RESOLVE';
                this.slime.vx = 0;
                this.slime.vy = 0;
                
                if (type === 'safe') {
                    this.slime.state = 'happy';
                    this.streak++;
                    this.multiplier = Math.min(5, 1 + Math.floor(this.streak / 3));
                    const timeBonus = Math.floor(Math.max(0, this.timer) * 10);
                    this.score += (100 + timeBonus) * this.multiplier;
                    
                    this.triggerUIUpdate();
                    
                    for(let i=0; i<30; i++) {
                        this.particles.push({
                            x: this.slime.x, y: this.slime.y,
                            vx: (Math.random()-0.5)*300, vy: -Math.random()*400,
                            size: Math.random()*6+3, color: COLORS.slimeHighlight, life: 1.5
                        });
                    }

                    setTimeout(() => this.nextLevel(false), 1500); 

                } else {
                    this.slime.state = 'melting';
                    this.streak = 0;
                    this.multiplier = 1;
                    
                    setTimeout(() => {
                        this.state = 'GAMEOVER';
                        this.triggerUIUpdate();
                    }, 2000);
                }
            }

            drawRoundedRect(x, y, w, h, r) {
                this.ctx.beginPath();
                this.ctx.moveTo(x + r, y);
                this.ctx.arcTo(x + w, y, x + w, y + h, r);
                this.ctx.arcTo(x + w, y + h, x, y + h, r);
                this.ctx.arcTo(x, y + h, x, y, r);
                this.ctx.arcTo(x, y, x + w, y, r);
                this.ctx.closePath();
            }

            drawLevelEnvironment(bY, safeZoneObj) {
                const timeWave = Date.now() / 200;
                
                this.ctx.fillStyle = COLORS.acidMid;
                this.ctx.fillRect(0, bY + this.height * 0.7, this.width, this.height * 1.5);
                
                this.ctx.fillStyle = COLORS.acidTop;
                this.ctx.beginPath();
                this.ctx.moveTo(0, bY + this.height * 0.7);
                for(let x=0; x<=this.width; x+=20) {
                    this.ctx.lineTo(x, bY + this.height * 0.7 + Math.sin(x/30 + timeWave) * 5);
                }
                this.ctx.lineTo(this.width, bY + this.height);
                this.ctx.lineTo(0, bY + this.height);
                this.ctx.fill();

                if (safeZoneObj) {
                    this.ctx.fillStyle = COLORS.bgBottom; 
                    this.ctx.fillRect(safeZoneObj.x, bY + this.height * 0.65, safeZoneObj.w, this.height * 1.5);
                    
                    this.ctx.fillStyle = COLORS.safeGroundMid;
                    this.ctx.fillRect(safeZoneObj.x, safeZoneObj.y, safeZoneObj.w, this.height * 1.5);
                    this.ctx.fillStyle = COLORS.safeGroundTop;
                    this.drawRoundedRect(safeZoneObj.x, safeZoneObj.y, safeZoneObj.w, 15, 5);
                    this.ctx.fill();
                }
            }

            draw() {
                const grad = this.ctx.createLinearGradient(0, 0, 0, this.height);
                grad.addColorStop(0, COLORS.bgTop);
                grad.addColorStop(1, COLORS.bgBottom);
                this.ctx.fillStyle = grad;
                this.ctx.fillRect(0, 0, this.width, this.height);

                if (this.state === 'MENU') return;

                this.ctx.save();
                this.ctx.translate(0, -this.cameraY);

                if (this.oldBaseY !== undefined && this.state === 'TRANSITION') {
                    this.drawLevelEnvironment(this.oldBaseY, this.oldSafeZone);
                }
                
                const currentSafeZone = this.consequenceZones.find(z => z.type === 'safe');
                this.drawLevelEnvironment(this.baseY, currentSafeZone);

                this.ctx.fillStyle = COLORS.acidBubble;
                this.acidBubbles.forEach(b => {
                    this.ctx.globalAlpha = b.life;
                    this.ctx.beginPath();
                    this.ctx.arc(b.x, b.y, b.s, 0, Math.PI*2);
                    this.ctx.fill();
                });
                this.ctx.globalAlpha = 1.0;

                if (this.cloudY > this.baseY - 200) {
                    this.ctx.fillStyle = COLORS.white;
                    this.ctx.beginPath();
                    
                    const r = Math.min(60, this.width * 0.15); 
                    const step = r * 1.2;
                    const cols = Math.ceil(this.width / step) + 1;
                    
                    for(let i = 0; i < cols; i++) {
                        this.ctx.arc(i * step, this.cloudY, r, 0, Math.PI * 2);
                    }
                    this.ctx.fill();
                    this.ctx.fillRect(0, this.cloudY, this.width, this.height);
                }

                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                
                this.platforms.forEach(p => {
                    this.ctx.save();
                    this.ctx.translate(p.x + p.shakeOffX, p.y + p.shakeOffY);
                    
                    this.ctx.shadowColor = 'rgba(0,0,0,0.15)';
                    this.ctx.shadowOffsetY = 6;
                    this.ctx.shadowBlur = 0;
                    
                    this.ctx.fillStyle = p.color;
                    this.drawRoundedRect(0, 0, p.w, p.h, 12);
                    this.ctx.fill();
                    
                    this.ctx.shadowColor = 'transparent';
                    
                    let fontSize = Math.min(20, p.w / 4);
                    this.ctx.font = `bold ${fontSize}px "Nunito", sans-serif`;
                    this.ctx.fillStyle = COLORS.white;
                    
                    let text = p.text;
                    while(this.ctx.measureText(text).width > p.w - 10 && fontSize > 10) {
                        fontSize--;
                        this.ctx.font = `bold ${fontSize}px "Nunito", sans-serif`;
                    }
                    this.ctx.fillText(text, p.w/2, p.h/2 + 2);
                    this.ctx.restore();
                });

                this.particles.forEach(p => {
                    this.ctx.globalAlpha = p.life;
                    this.ctx.fillStyle = p.color;
                    this.drawRoundedRect(p.x, p.y, p.size, p.size, 2);
                    this.ctx.fill();
                });
                this.ctx.globalAlpha = 1.0;

                this.ctx.save();
                this.ctx.translate(this.slime.x, this.slime.y);
                this.ctx.scale(this.slime.sx, this.slime.sy); 
                
                const sw = this.slime.w;
                const sh = this.slime.h;
                
                this.ctx.fillStyle = COLORS.slimeBase;
                this.drawRoundedRect(-sw/2, -sh/2, sw, sh, 15);
                this.ctx.fill();
                
                this.ctx.fillStyle = COLORS.slimeHighlight;
                this.ctx.beginPath();
                this.ctx.ellipse(-sw/4, -sh/3, sw/4, sh/6, Math.PI/8, 0, Math.PI*2);
                this.ctx.fill();

                if (this.slime.state === 'melting') {
                    this.ctx.strokeStyle = '#000';
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();
                    this.ctx.moveTo(-12, -8); this.ctx.lineTo(-4, 0);
                    this.ctx.moveTo(-4, -8); this.ctx.lineTo(-12, 0);
                    this.ctx.moveTo(12, -8); this.ctx.lineTo(4, 0);
                    this.ctx.moveTo(4, -8); this.ctx.lineTo(12, 0);
                    this.ctx.stroke();
                } else {
                    this.ctx.fillStyle = '#000';
                    this.ctx.beginPath();
                    if (this.slime.state === 'happy') {
                        this.ctx.arc(-8, -4, 4, Math.PI, 0);
                        this.ctx.arc(8, -4, 4, Math.PI, 0);
                        this.ctx.strokeStyle = '#000';
                        this.ctx.lineWidth = 2.5;
                        this.ctx.stroke();
                    } else {
                        this.ctx.ellipse(-8, -4, 4, 6, 0, 0, Math.PI*2);
                        this.ctx.ellipse(8, -4, 4, 6, 0, 0, Math.PI*2);
                        this.ctx.fill();
                        this.ctx.fillStyle = '#FFF';
                        this.ctx.beginPath();
                        this.ctx.arc(-9, -6, 1.5, 0, Math.PI*2);
                        this.ctx.arc(7, -6, 1.5, 0, Math.PI*2);
                        this.ctx.fill();
                    }
                }

                this.ctx.restore();
                this.ctx.restore();
            }

            setInput(key, val) {
                if (this.keys[key] !== undefined) {
                    this.keys[key] = val;
                }
            }
        }

        // --- SISTEMA DE UI E CONTROLOS DOM ---
        let gameEngine;

        function updateUI(stateObj) {
            // Alternar Menus e Overlays
            document.getElementById('menu-overlay').classList.toggle('hidden', stateObj.state !== 'MENU');
            document.getElementById('gameover-overlay').classList.toggle('hidden', stateObj.state !== 'GAMEOVER');
            
            const showHUD = ['PLAYING', 'FALLING', 'RESOLVE', 'TRANSITION'].includes(stateObj.state);
            document.getElementById('hud-overlay').classList.toggle('hidden', !showHUD);
            
            const showControls = stateObj.state === 'PLAYING';
            document.getElementById('controls-overlay').classList.toggle('hidden', !showControls);

            // Atualizar Textos
            if (showHUD) {
                document.getElementById('score-text').innerText = stateObj.score;
                document.getElementById('question-text').innerText = stateObj.question || '';

                const multContainer = document.getElementById('multiplier-container');
                if (stateObj.multiplier > 1) {
                    multContainer.classList.remove('hidden');
                    document.getElementById('multiplier-text').innerText = 'x' + stateObj.multiplier;
                } else {
                    multContainer.classList.add('hidden');
                }

                const timerContainer = document.getElementById('timer-container');
                if (stateObj.state !== 'TRANSITION') {
                    timerContainer.classList.remove('hidden');
                    document.getElementById('timer-text').innerText = stateObj.timer + 's';
                    
                    // Adicionar classe de "Perigo" quando <= 5s
                    if (stateObj.timer <= 5) {
                        timerContainer.classList.add('danger');
                    } else {
                        timerContainer.classList.remove('danger');
                    }
                } else {
                    timerContainer.classList.add('hidden');
                }
            }

            if (stateObj.state === 'GAMEOVER') {
                document.getElementById('final-score-text').innerText = 'Pontuação: ' + stateObj.score;
            }
        }

        // Inicialização
        window.onload = () => {
            const canvas = document.getElementById('game-canvas');
            gameEngine = new GameEngine(canvas, updateUI);

            // Botões de Iniciar/Reiniciar
            document.getElementById('btn-start').onclick = () => gameEngine.start();
            document.getElementById('btn-restart').onclick = () => gameEngine.start();

            // Botão de Forçar Queda
            document.getElementById('btn-drop').onclick = () => {
                if (gameEngine.state === 'PLAYING') gameEngine.timer = 0;
            };

            // Controlos de Teclado
            window.addEventListener('keydown', (e) => {
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') gameEngine.setInput('left', true);
                if (e.code === 'ArrowRight' || e.code === 'KeyD') gameEngine.setInput('right', true);
                if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') gameEngine.setInput('jump', true);
            });
            window.addEventListener('keyup', (e) => {
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') gameEngine.setInput('left', false);
                if (e.code === 'ArrowRight' || e.code === 'KeyD') gameEngine.setInput('right', false);
                if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') gameEngine.setInput('jump', false);
            });

            // Controlos Touch (Mobile)
            const setupTouchButton = (id, key) => {
                const btn = document.getElementById(id);
                const press = (e) => { e.preventDefault(); gameEngine.setInput(key, true); };
                const release = (e) => { e.preventDefault(); gameEngine.setInput(key, false); };
                
                btn.addEventListener('pointerdown', press);
                btn.addEventListener('pointerup', release);
                btn.addEventListener('pointerleave', release);
            };

            setupTouchButton('btn-left', 'left');
            setupTouchButton('btn-right', 'right');
            setupTouchButton('btn-jump', 'jump');
        };
    </script>
</body>
