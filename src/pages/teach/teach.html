<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Criador de Quiz - Estilo Flat</title>

        <!-- FontAwesome para Ícones -->
        <link
            rel="stylesheet"
            href="../../libs/css/fontawesome-free-7.1.0-web/css/all.min.css"
        />
        <link href="../../styles/root.css" rel="stylesheet" />
        <link rel="stylesheet" href="./styles/teach.css" />

        <!-- SortableJS para Drag and Drop -->
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
        <script defer src="./scripts/teach.js" type="module"></script>
    </head>
    <body>
        <!-- Modal de Compartilhamento -->
        <div
            id="share-modal"
            class="modal-overlay hidden"
            onclick="handleModalOverlayClick(event)"
        >
            <div class="modal-card">
                <div class="modal-header">
                    <span class="modal-title">Compartilhar Quiz</span>
                    <button
                        class="icon-btn"
                        onclick="closeShareModal()"
                        title="Fechar"
                    >
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <div class="modal-qr">
                    <div id="qr"></div>
                </div>

                <div class="modal-qr-actions">
                    <button
                        class="btn btn-outline modal-qr-btn"
                        onclick="downloadQr()"
                    >
                        <i class="fa-solid fa-download"></i> Baixar PNG
                    </button>
                    <button
                        id="copy-qr-btn"
                        class="btn btn-outline modal-qr-btn hidden"
                        onclick="copyQrImage()"
                    >
                        <i class="fa-solid fa-image"></i> Copiar Imagem
                    </button>
                </div>

                <div class="modal-section-label">Link do Quiz</div>
                <div class="copy-row">
                    <input
                        type="text"
                        id="share-url-input"
                        class="copy-input"
                        readonly
                    />
                    <button
                        class="btn btn-primary copy-btn"
                        onclick="copyLink()"
                    >
                        <i class="fa-solid fa-copy"></i> Copiar
                    </button>
                </div>

                <button
                    class="btn btn-outline modal-close-btn"
                    onclick="closeShareModal()"
                >
                    Fechar
                </button>
            </div>
        </div>

        <!-- View da Lista de Quizzes -->
        <div id="list-view" class="container">
            <div class="list-header">
                <h1>Ensinar</h1>
                <a href="/src/pages/dashboard/dashboard.html">
                    <button class="btn btn-outline">
                        <i class="fa-solid fa-arrow-left"></i> Voltar
                    </button>
                </a>
                <button class="btn btn-primary" onclick="createNewQuiz()">
                    <i class="fa-solid fa-plus"></i> Criar Novo Quiz
                </button>
            </div>
            <div id="quiz-list-container" class="quiz-list">
                <div
                    style="
                        display: flex;
                        justify-content: center;
                        align-items: center;
                        color: #b7b7b7;
                        margin-top: 20px;
                    "
                >
                    <h2>Carregando...</h2>
                </div>
                <!-- Quizzes salvos aparecerão aqui -->
            </div>
        </div>

        <!-- View do Editor de Quiz -->
        <div id="editor-view" class="hidden">
            <div class="container">
                <h1>Editor de Quiz</h1>

                <div class="quiz-header">
                    <input
                        type="text"
                        id="quiz-title"
                        placeholder="Digite o título do Quiz"
                        required
                    />
                </div>

                <div id="questions-container">
                    <!-- As perguntas serão injetadas aqui via JavaScript -->
                </div>
            </div>

            <!-- Painel de ações fixo na parte inferior -->
            <div class="bottom-panel">
                <button class="btn btn-outline" onclick="showListView()">
                    <i class="fa-solid fa-arrow-left"></i> Voltar
                </button>
                <button class="btn btn-outline" onclick="addQuestion()">
                    <i class="fa-solid fa-plus"></i> Nova Pergunta
                </button>
                <button class="btn btn-success" onclick="saveQuiz()">
                    <i class="fa-solid fa-floppy-disk"></i> Salvar Quiz
                </button>
            </div>
        </div>
        <!-- Fim do editor-view -->

        <!-- View dos Relatórios -->
        <div id="reports-view" class="hidden">
            <div class="container">
                <div class="list-header">
                    <div style="display: flex; gap: 10px">
                        <button
                            class="btn btn-outline"
                            onclick="showListView()"
                        >
                            <i class="fa-solid fa-arrow-left"></i> Voltar
                        </button>
                        <button
                            class="btn btn-outline"
                            onclick="refreshReports()"
                            title="Atualizar"
                        >
                            <i class="fa-solid fa-rotate-right"></i>
                        </button>
                    </div>
                    <h1 id="reports-quiz-title">Relatórios</h1>
                </div>

                <div class="reports-filter-bar">
                    <label
                        for="report-date-filter"
                        class="reports-filter-label"
                    >
                        <i class="fa-solid fa-calendar"></i> Filtrar por data:
                    </label>
                    <input
                        type="date"
                        id="report-date-filter"
                        class="reports-date-input"
                        onchange="filterReports()"
                    />
                    <button
                        class="btn btn-outline reports-clear-btn"
                        onclick="clearReportFilter()"
                    >
                        <i class="fa-solid fa-xmark"></i> Limpar
                    </button>
                </div>

                <div id="reports-container">
                    <!-- Respostas agrupadas por data aparecem aqui -->
                </div>
            </div>
        </div>
        <!-- Fim do reports-view -->
    </body>
</html>
